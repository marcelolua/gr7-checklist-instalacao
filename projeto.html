<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GR7 — Projeto</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#07080d;--s1:#0e1018;--s2:#161820;--s3:#1e2030;--bdr:#252738;--text:#dde1f0;--muted:#5a5e78;--r:14px;--green:#00e5a0;--green2:#059669;--c0:#818cf8;--c1:#38bdf8;--c2:#34d399;--c3:#fbbf24;--c4:#f87171;--c5:#e879f9;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5}
.blob{position:fixed;border-radius:50%;filter:blur(140px);pointer-events:none;z-index:0;opacity:.1}
.blob1{width:600px;height:600px;top:-150px;left:0;background:var(--c0)}
.blob2{width:500px;height:500px;bottom:-150px;right:-50px;background:var(--c5)}
/* LAYOUT */
.shell{position:relative;z-index:10;padding:0 40px 80px}
.hero{display:flex;align-items:center;gap:22px;padding:28px 0 22px;flex-wrap:wrap}
.hero-av{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#fff;flex-shrink:0}
.hero-info{flex:1;min-width:0}
.hero-name{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hero-sub{font-size:12px;color:var(--muted);margin-top:3px}
.hero-badges{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px}
.badge.info{background:var(--s2);color:var(--muted);border:1px solid var(--bdr)}
.hero-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid;font-family:'Outfit',sans-serif}
.btn-ghost{background:transparent;border-color:var(--bdr);color:var(--muted)}
.btn-ghost:hover{border-color:var(--c0);color:var(--c0)}
.btn-purple{background:rgba(129,140,248,.1);border-color:var(--c0);color:var(--c0)}
.btn-purple:hover{background:rgba(129,140,248,.2)}
/* PROGRESS HERO */
.prog-bar-hero{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:18px 22px;margin-bottom:24px;display:flex;align-items:center;gap:20px}
.prog-track{flex:1;height:10px;background:var(--s3);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.prog-stats{display:flex;gap:18px;flex-shrink:0}
.ps{text-align:center}
.ps-n{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600}
.ps-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
/* GRID */
.main-grid{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
/* BOXES */
.box{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:20px}
.box-head{padding:15px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.box-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.box-meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)}
/* INSTALAÇÕES */
.install-row{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .15s;text-decoration:none}
.install-row:last-child{border-bottom:none}
.install-row:hover{background:rgba(255,255,255,.025)}
.inst-left{display:flex;align-items:center;gap:12px}
.inst-icon{width:36px;height:36px;background:var(--s2);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.inst-name{font-size:13px;font-weight:600}
.inst-sub{font-size:10px;color:var(--muted);margin-top:2px}
.inst-right{display:flex;align-items:center;gap:8px}
.inst-pct{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;min-width:32px;text-align:right}
.inst-arrow{color:var(--muted);font-size:16px}
/* MÓDULOS */
.mods-wrap{padding:14px 18px;display:flex;flex-wrap:wrap;gap:7px}
.mod-pill{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:5px 10px;border-radius:7px;background:var(--s2);border:1.5px solid var(--bdr);color:var(--muted);cursor:pointer;transition:all .15s;user-select:none}
.mod-pill:hover{border-color:#3a3e58;color:var(--text)}
.mod-pill.done{background:rgba(0,229,160,.07);border-color:rgba(0,229,160,.35);color:var(--green)}
.mod-pill-ck{width:14px;height:14px;border-radius:3px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s}
.mod-pill.done .mod-pill-ck{background:var(--green);border-color:var(--green);color:#000}
.mod-pill-date{font-size:9px;color:var(--green);font-weight:400}
/* TAREFAS PROJETO */
.task-proj-list{display:flex;flex-direction:column;gap:7px;padding:12px 16px}
.task-proj-row{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;padding:10px 12px;background:var(--s2);border:1px solid var(--bdr);border-radius:9px;cursor:pointer;transition:all .15s;text-decoration:none}
.task-proj-row:hover{border-color:rgba(129,140,248,.3)}
.task-proj-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.task-proj-body{min-width:0}
.task-proj-title{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-proj-title.done{text-decoration:line-through;color:var(--muted)}
.task-proj-meta{display:flex;align-items:center;gap:8px;margin-top:3px}
.task-proj-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;white-space:nowrap}
.task-proj-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.task-proj-av{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:9px;font-weight:800}
.task-proj-add{display:flex;align-items:center;gap:8px;margin:8px 16px 14px;padding:9px 12px;border:1.5px dashed var(--bdr);border-radius:9px;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.task-proj-add:hover{border-color:var(--green);color:var(--green);background:rgba(0,229,160,.04)}
/* STATUS MANAGER */
.status-current{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr)}
.status-label-big{font-size:14px;font-weight:700}
.status-date{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)}
.status-select-wrap{padding:12px 18px;border-bottom:1px solid var(--bdr)}
.status-select-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.status-opt{padding:8px 10px;border-radius:8px;border:1.5px solid var(--bdr);background:var(--s2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;color:var(--muted)}
.status-opt:hover{border-color:#3a3e58;color:var(--text)}
.status-opt.sel{border-color:var(--green);background:rgba(0,229,160,.08);color:var(--green)}
.status-add-wrap{padding:10px 18px;display:flex;gap:7px;border-bottom:1px solid var(--bdr)}
.status-add-inp{flex:1;background:var(--s2);border:1px solid var(--bdr);border-radius:7px;padding:7px 10px;color:var(--text);font-size:12px;font-family:'Outfit',sans-serif;outline:none;transition:border-color .2s}
.status-add-inp:focus{border-color:var(--c0)}
.status-add-inp::placeholder{color:var(--muted)}
.status-add-btn{background:rgba(129,140,248,.1);border:1px solid rgba(129,140,248,.3);border-radius:7px;padding:7px 12px;color:var(--c0);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.status-add-btn:hover{background:rgba(129,140,248,.2)}
.status-apply-btn{margin:10px 18px 14px;width:calc(100% - 36px);padding:10px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid var(--green);background:rgba(0,229,160,.1);color:var(--green);font-family:'Outfit',sans-serif}
.status-apply-btn:hover{background:rgba(0,229,160,.2)}
/* HISTÓRICO HORIZONTAL */
.feed-wrap{padding:16px 20px 20px;overflow-x:auto}
.feed{display:flex;gap:0;position:relative}
.feed::before{content:'';position:absolute;top:16px;left:16px;right:16px;height:2px;background:var(--bdr);z-index:0}
.feed-item{display:flex;flex-direction:column;align-items:center;flex:1;min-width:130px;max-width:200px;position:relative;z-index:1;padding:0 8px}
.feed-dot-wrap{display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.feed-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--bg);flex-shrink:0}
.feed-card{background:var(--s2);border:1px solid var(--bdr);border-radius:9px;padding:9px 11px;width:100%;transition:border-color .15s}
.feed-card:hover{border-color:rgba(255,255,255,.12)}
.feed-label{font-size:11px;font-weight:700;line-height:1.3;margin-bottom:4px}
.feed-by{font-size:10px;color:var(--muted);margin-bottom:2px}
.feed-date{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted)}
.feed-note{font-size:10px;color:var(--muted);margin-top:4px;font-style:italic;line-height:1.4}
/* INPUT NOTA */
.nota-wrap{padding:12px 20px 16px;border-top:1px solid var(--bdr);display:flex;gap:8px;align-items:flex-end}
.nota-inp{flex:1;background:var(--s2);border:1px solid var(--bdr);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;font-family:'Outfit',sans-serif;outline:none;resize:none;transition:border-color .2s;line-height:1.4}
.nota-inp:focus{border-color:var(--c0)}
.nota-inp::placeholder{color:var(--muted)}
/* CONTATO */
.contact-grid{padding:14px 18px;display:flex;flex-direction:column;gap:8px}
.cg-row{display:flex;align-items:center;gap:8px;font-size:12px}
.cg-label{color:var(--muted);width:76px;flex-shrink:0;font-size:11px}
.cg-val{color:var(--text);font-weight:500}
/* INFRA MINI */
.infra-mini{padding:12px 18px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.infra-card{background:var(--s2);border-radius:9px;padding:11px;text-align:center}
.infra-n{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700}
.infra-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#1e2030;border:1px solid #333;border-radius:10px;padding:12px 18px;font-size:13px;color:#ccc;z-index:9999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{border-color:rgba(0,229,160,.4);color:var(--green)}
.toast.error{border-color:rgba(248,113,113,.4);color:var(--c4)}
.spin{width:16px;height:16px;border:2px solid var(--bdr);border-top-color:var(--c0);border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.loader{padding:60px;text-align:center;color:var(--muted)}
@media(max-width:900px){.main-grid{grid-template-columns:1fr}.shell{padding:0 16px 80px}}
/* BREADCRUMB */
.breadcrumb{display:flex;align-items:center;gap:8px;padding:20px 0 0;font-size:12px;color:var(--muted);font-family:'IBM Plex Mono',monospace;flex-wrap:wrap}
.breadcrumb a{color:var(--muted);text-decoration:none;transition:color .15s}
.breadcrumb a:hover{color:var(--text)}
.breadcrumb-sep{opacity:.4;font-size:10px}
.breadcrumb-current{color:var(--text);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:260px}
</style>
<script src="sidebar.js"></script>

<body>
<div class="blob blob1"></div><div class="blob blob2"></div>


<div class="shell" id="shell"></div>
<div class="toast" id="toast"></div>

<script>
const SURL='https://nhzjkahbkeusgntheyug.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oemprYWhia2V1c2dudGhleXVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjYwMDQsImV4cCI6MjA4ODg0MjAwNH0.hB2bJBMoJoztuNrb4xCRIgWmwMlayBpVOMWq3mI4nH4';
const SH={'Content-Type':'application/json','apikey':SKEY,'Authorization':'Bearer '+SKEY,'Prefer':'return=representation'};
async function dbGet(p){const r=await fetch(SURL+'/rest/v1/'+p,{headers:SH});return r.json();}
async function dbPost(t,b){const r=await fetch(SURL+'/rest/v1/'+t,{method:'POST',headers:SH,body:JSON.stringify(b)});return r.json();}
async function dbPatch(t,f,b){const r=await fetch(SURL+'/rest/v1/'+t+'?'+f,{method:'PATCH',headers:SH,body:JSON.stringify(b)});return r.json();}
async function dbDelete(t,f){await fetch(SURL+'/rest/v1/'+t+'?'+f,{method:'DELETE',headers:SH});}
async function dbUpsert(t,b,oc){const h={...SH,Prefer:'resolution=merge-duplicates,return=representation'};const r=await fetch(SURL+'/rest/v1/'+t+'?on_conflict='+oc,{method:'POST',headers:h,body:JSON.stringify(b)});return r.json();}


const PAL=['#818cf8','#38bdf8','#34d399','#fbbf24','#f87171','#e879f9','#fb923c','#4ade80','#a78bfa','#22d3ee'];
function getColor(s){let h=0;for(const c of(s||'A'))h=(h*31+c.charCodeAt(0))%PAL.length;return PAL[h];}
function ini(s){return(s||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'});}
function fmtDateTime(d){if(!d)return'—';return new Date(d).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});}
function toast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.classList.remove('show'),3200);}

const clienteId=new URLSearchParams(location.search).get('id');

// STATUS CONFIG
const STATUS_DEFAULT=[
  {key:'a_fazer',    label:'A Fazer',    color:'#5a5e78'},
  {key:'contatado',  label:'Contatado',  color:'#38bdf8'},
  {key:'instalando', label:'Instalando', color:'#818cf8'},
  {key:'importando', label:'Importando', color:'#fbbf24'},
  {key:'concluido',  label:'Concluído',  color:'#00e5a0'},
  {key:'inaugurado', label:'Inaugurado', color:'#34d399'},
  {key:'cadastrando',label:'Cadastrando',color:'#fb923c'},
  {key:'pausado',    label:'Pausado',    color:'#f87171'},
  {key:'cancelado',  label:'Cancelado',  color:'#ef4444'},
];

let statusList = [...STATUS_DEFAULT];
let selectedStatusKey = null;

let cliente={}, progresso={}, modulos_prog={}, tasks=[], timeline=[], customStatuses=[];

const SCNT={servidor:23,retaguarda:18,nfce:18};

function buildMaq(c){
  const l=[];
  for(let i=1;i<=(parseInt(c.qtd_servidor)||0);i++)l.push({key:`servidor_${i}`,tipo:'servidor',label:`Servidor${(parseInt(c.qtd_servidor)||0)>1?' '+i:''}`,icon:'🖥️'});
  for(let i=1;i<=(parseInt(c.qtd_retaguarda)||0);i++)l.push({key:`retaguarda_${i}`,tipo:'retaguarda',label:`Retaguarda${(parseInt(c.qtd_retaguarda)||0)>1?' '+i:''}`,icon:'🗄️'});
  for(let i=1;i<=(parseInt(c.qtd_caixas)||0);i++)l.push({key:`nfce_${i}`,tipo:'nfce',label:`PDV / NFCe${(parseInt(c.qtd_caixas)||0)>1?' '+i:''}`,icon:'🧾'});
  return l;
}

function calcGeral(){
  let tot=0,dn=0;
  buildMaq(cliente).forEach(m=>{
    const n=SCNT[m.tipo]||0;tot+=n;
    const mp=(progresso[m.key])||{};
    dn+=Object.values(mp).filter(v=>v?.done).length;
  });
  const mods=cliente.modulos||[];tot+=mods.length;
  dn+=mods.filter(m=>modulos_prog[m]?.done).length;
  // tarefas não contam no progresso geral de instalação
  return{tot,dn,pct:tot?Math.round(dn/tot*100):0};
}

function getStatus(key){
  return statusList.find(s=>s.key===key) || {key:key,label:key,color:'#5a5e78'};
}

function currentStatusFromTimeline(){
  const statusEvents = timeline.filter(t=>t.tipo==='status').sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  return statusEvents[0]?.conteudo || 'a_fazer';
}

async function load(){
  document.getElementById('shell').innerHTML=gr7Skeletons.projetoShell();
  if(!clienteId){document.getElementById('shell').innerHTML='<div class="loader" style="color:var(--c4)">❌ ID não informado. <a href="implantacao.html" style="color:var(--c0)">Voltar</a></div>';return;}
  try{
    const [c,pg,mg,tg,tl,cs]=await Promise.all([
      dbGet(`clientes_gr7?id=eq.${clienteId}&limit=1`),
      dbGet(`implant_checklist?cliente_id=eq.${clienteId}&select=maquina_key,item_num,concluido,data_conclusao`),
      dbGet(`implant_modulos?cliente_id=eq.${clienteId}`),
      dbGet(`tarefas?cliente_id=eq.${clienteId}&order=criado_em.desc`),
      dbGet(`projeto_timeline?cliente_id=eq.${clienteId}&order=created_at.asc`).catch(()=>[]),
      dbGet(`projeto_status_custom?cliente_id=eq.${clienteId}`).catch(()=>[]),
    ]);

    if(!Array.isArray(c)||!c[0]){document.getElementById('shell').innerHTML='<div class="loader" style="color:var(--c4)">❌ Cliente não encontrado. <a href="implantacao.html" style="color:var(--c0)">Voltar</a></div>';return;}
    cliente={...c[0],modulos:typeof c[0].modulos==='string'?JSON.parse(c[0].modulos||'[]'):(c[0].modulos||[])};

    progresso={};
    if(Array.isArray(pg))pg.forEach(p=>{
      if(!progresso[p.maquina_key])progresso[p.maquina_key]={};
      progresso[p.maquina_key][p.item_num]={done:p.concluido,date:p.data_conclusao};
    });
    modulos_prog={};
    if(Array.isArray(mg))mg.forEach(m=>{modulos_prog[m.modulo]={done:m.concluido,date:m.data_conclusao};});
    tasks=Array.isArray(tg)?tg.map(t=>({...t,arquivos:typeof t.arquivos==='string'?JSON.parse(t.arquivos||'[]'):(t.arquivos||[])})):[];
    timeline=Array.isArray(tl)?tl:[];

    // Custom statuses
    if(Array.isArray(cs) && cs.length){
      cs.forEach(s=>{
        if(!statusList.find(x=>x.key===s.key)){
          statusList.push({key:s.key,label:s.label,color:s.color||'#818cf8'});
        }
      });
    }

    renderPage();
  }catch(e){
    document.getElementById('shell').innerHTML='<div class="loader" style="color:var(--c4)">⚠️ '+humanizeError(e)+'</div>';
  }
}

function renderPage(){
  const c=cliente;
  const col=getColor(c.razao_social||'');
  const av=ini(c.nome_fantasia||c.razao_social||'');
  const {tot,dn,pct}=calcGeral();
  const curStatusKey=currentStatusFromTimeline();
  const curStatus=getStatus(curStatusKey);
  const barCol=curStatus.color;
  const maquinas=buildMaq(c);
  document.title=`GR7 — ${c.nome_fantasia||c.razao_social}`;

  // ── INSTALAÇÕES ──
  const installHtml=maquinas.length?maquinas.map(m=>{
    const n=SCNT[m.tipo]||0;
    const mp=progresso[m.key]||{};
    const done=Object.values(mp).filter(v=>v?.done).length;
    const mpct=n?Math.round(done/n*100):0;
    const mc=mpct===100?'#00e5a0':mpct>=60?'#fbbf24':'#818cf8';
    // Build URL for Checklist.html
    const ckUrl=`Checklist.html?clienteId=${clienteId}&tipo=${m.tipo}&maquina=${m.key}&nome=${encodeURIComponent(c.nome_fantasia||c.razao_social||'')}&pc=${m.key}&emp=${encodeURIComponent(c.responsavel||'')}`;
    return `<a class="install-row" href="${ckUrl}" target="_blank">
      <div class="inst-left">
        <div class="inst-icon">${m.icon}</div>
        <div><div class="inst-name">${m.icon} ${m.label}</div><div class="inst-sub">${done}/${n} etapas · clique para abrir checklist</div></div>
      </div>
      <div class="inst-right">
        <span class="inst-pct" style="color:${mc}">${mpct===100?'✅':mpct+'%'}</span>
        <span class="inst-arrow">↗</span>
      </div>
    </a>`;
  }).join(''):`<div style="padding:14px 20px;color:var(--muted);font-size:13px">Nenhuma máquina configurada.</div>`;

  // ── MÓDULOS ──
  const mods=c.modulos||[];
  const modsHtml=mods.length?`<div class="mods-wrap">${mods.map(m=>{
    const d=modulos_prog[m];const isDone=d?.done;const dt=d?.date?fmtDate(d.date):'';
    return `<div class="mod-pill ${isDone?'done':''}" onclick="toggleModulo('${m}',${!isDone})">
      <div class="mod-pill-ck">${isDone?'✓':''}</div>${m}${isDone&&dt?`<span class="mod-pill-date">${dt}</span>`:''}
    </div>`;
  }).join('')}</div>`:`<div style="padding:14px 20px;color:var(--muted);font-size:13px">Nenhum módulo contratado.</div>`;

  // ── TASKS ──
  const PRIO_COLOR_T={'urgente':'var(--c4)','alta':'var(--c3)','normal':'var(--c0)','baixa':'var(--muted)'};
  const STATUS_COLOR_T={'a_fazer':'var(--muted)','fazendo':'var(--c0)','pausado':'var(--c3)','feito':'var(--green)'};
  const STATUS_LABEL_T={'a_fazer':'A Fazer','fazendo':'Fazendo','pausado':'Pausado','feito':'Feito'};
  const PRIO_LABEL_T={'urgente':'&#128308; Urgente','alta':'&#128993; Alta','normal':'&#128309; Normal','baixa':'&#9898; Baixa'};
  const tasksDone=tasks.filter(function(t){return t.status==='feito';}).length;

  // navega para tarefas do cliente — função separada evita aspas aninhadas
  function _irParaTarefas(){ window.location.href='tarefas.html?cliente='+clienteId; }

  function _buildTaskRow(t){
    var sc=STATUS_COLOR_T[t.status]||'var(--muted)';
    var pc=PRIO_COLOR_T[t.prioridade]||'var(--muted)';
    var doneClass=t.status==='feito'?' done':'';
    var dateStr=t.previsao_termino
      ? '<span style="font-size:10px;color:var(--muted)">&#128197; '+fmtDate(t.previsao_termino)+'</span>'
      : '';
    var attachStr=(t.arquivos&&t.arquivos.length)
      ? '<span style="font-size:10px;color:var(--muted)">&#128206; '+t.arquivos.length+'</span>'
      : '';
    var prioSpan='<span class="task-proj-badge" style="background:'+pc+'18;color:'+pc+';border:1px solid '+pc+'30">'+(PRIO_LABEL_T[t.prioridade]||t.prioridade)+'</span>';
    var statSpan='<span class="task-proj-badge" style="background:'+sc+'15;color:'+sc+';border:1px solid '+sc+'25">'+(STATUS_LABEL_T[t.status]||t.status)+'</span>';
    return '<div class="task-proj-row" onclick="_irParaTarefas()">'
      +'<div class="task-proj-dot" style="background:'+sc+'"></div>'
      +'<div class="task-proj-body">'
        +'<div class="task-proj-title'+doneClass+'">'+t.titulo+'</div>'
        +'<div class="task-proj-meta">'+prioSpan+statSpan+dateStr+attachStr+'</div>'
      +'</div>'
      +'</div>';
  }

  var tasksHtml='<div class="task-proj-list">'
    +(tasks.length?tasks.map(_buildTaskRow).join(''):'<div style="padding:8px 4px;color:var(--muted);font-size:12px">Nenhuma tarefa vinculada.</div>')
    +'</div>'
    +'<div class="task-proj-add" onclick="_irParaTarefas()">&#65291; Gerenciar tarefas</div>';

  // ── STATUS GRID ──
  const statusGridHtml=statusList.map(s=>`<div class="status-opt ${selectedStatusKey===s.key?'sel':''}" 
    style="${selectedStatusKey===s.key?`border-color:${s.color};background:${s.color}18;color:${s.color}`:''}"
    onclick="selectStatus('${s.key}')">${s.label}</div>`).join('');

  // ── FEED HORIZONTAL ──
  const tlHtml=timeline.length?[...timeline].reverse().map(ev=>{
    const isStatus=ev.tipo==='status';
    const st=isStatus?getStatus(ev.conteudo):null;
    const dotColor=isStatus?(st?.color||'#818cf8'):'#5a5e78';
    const label=isStatus?('Status → '+(st?.label||ev.conteudo)):(ev.autor||'Anotação');
    return `<div class="feed-item">
      <div class="feed-dot-wrap"><div class="feed-dot" style="background:${dotColor}"></div></div>
      <div class="feed-card">
        <div class="feed-label" style="color:${dotColor}">${label}</div>
        ${!isStatus&&ev.conteudo?`<div class="feed-note">${ev.conteudo}</div>`:''}
        <div class="feed-date">${fmtDateTime(ev.created_at)}</div>
      </div>
    </div>`;
  }).join(''):`<div style="color:var(--muted);font-size:12px;padding:4px 0">Nenhum evento registrado ainda.</div>`;

  document.getElementById('shell').innerHTML=`
    <nav class="breadcrumb">
      <a href="implantacao.html">🚀 Implantação</a>
      <span class="breadcrumb-sep">›</span>
      <span class="breadcrumb-current">${c.nome_fantasia||c.razao_social||'Projeto'}</span>
    </nav>
    <div class="hero">
      <div class="hero-av" style="background:${col}22;border:2px solid ${col}44">${av}</div>
      <div class="hero-info">
        <div class="hero-name">${c.razao_social||'—'}</div>
        <div class="hero-sub">${c.nome_fantasia||''}</div>
        <div class="hero-badges">
          <span class="badge" style="background:${curStatus.color}18;color:${curStatus.color};border:1px solid ${curStatus.color}44">${curStatus.label}</span>
          ${c.cnpj?`<span class="badge info">🪪 ${c.cnpj}</span>`:''}
          ${c.data_venda?`<span class="badge info">📅 ${fmtDate(c.data_venda)}</span>`:''}
        </div>
      </div>
      <div class="hero-actions">
        <button class="btn btn-ghost" onclick="window.location.href='implantacao.html'">← Voltar</button>
        <button class="btn btn-purple" onclick="window.location.href='clientes.html?edit='+clienteId">✏️ Editar</button>
      </div>
    </div>

    <div class="prog-bar-hero">
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <span style="font-size:12px;color:var(--muted)">Progresso Geral</span>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;color:${barCol}">${pct}%</span>
        </div>
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${barCol}"></div></div>
      </div>
      <div class="prog-stats">
        <div class="ps"><div class="ps-n" style="color:${barCol}">${dn}</div><div class="ps-l">Feitas</div></div>
        <div class="ps"><div class="ps-n" style="color:var(--muted)">${tot-dn}</div><div class="ps-l">Restam</div></div>
        <div class="ps"><div class="ps-n" style="color:var(--text)">${tot}</div><div class="ps-l">Total</div></div>
      </div>
    </div>

    <div class="main-grid">
      <div>
        <div class="box">
          <div class="box-head"><span class="box-title">🖥️ Instalações</span><span class="box-meta">${maquinas.length} máquina${maquinas.length!==1?'s':''}</span></div>
          ${installHtml}
        </div>
        <div class="box">
          <div class="box-head"><span class="box-title">🧩 Módulos</span><span class="box-meta">${mods.filter(m=>modulos_prog[m]?.done).length}/${mods.length}</span></div>
          ${modsHtml}
        </div>
        <div class="box">
          <div class="box-head"><span class="box-title">📋 Tarefas</span><span class="box-meta">${tasksDone}/${tasks.length}</span></div>
          ${tasksHtml}
        </div>
      </div>

      <div>
        <!-- CONTATO -->
        <div class="box" style="margin-bottom:20px">
          <div class="box-head"><span class="box-title">📞 Contato</span></div>
          <div class="contact-grid">
            <div class="cg-row"><span class="cg-label">Responsável</span><span class="cg-val">${c.responsavel||'—'}</span></div>
            <div class="cg-row"><span class="cg-label">Telefone</span><span class="cg-val">${c.telefone||'—'}</span></div>
            <div class="cg-row"><span class="cg-label">CNPJ</span><span class="cg-val" style="font-family:monospace;font-size:11px">${c.cnpj||'—'}</span></div>
            <div class="cg-row"><span class="cg-label">Venda</span><span class="cg-val">${fmtDate(c.data_venda)}</span></div>
          </div>
        </div>

        <!-- INFRA -->
        <div class="box" style="margin-bottom:20px">
          <div class="box-head"><span class="box-title">⚙️ Infraestrutura</span></div>
          <div class="infra-mini">
            <div class="infra-card"><div class="infra-n" style="color:var(--c0)">${c.qtd_servidor||0}</div><div class="infra-l">Servidores</div></div>
            <div class="infra-card"><div class="infra-n" style="color:var(--c1)">${c.qtd_retaguarda||0}</div><div class="infra-l">Retaguardas</div></div>
            <div class="infra-card"><div class="infra-n" style="color:var(--green)">${c.qtd_caixas||0}</div><div class="infra-l">Caixas</div></div>
          </div>
        </div>

        <!-- STATUS -->
        <div class="box">
          <div class="box-head"><span class="box-title">🔖 Status do Projeto</span></div>
          <div class="status-current">
            <span class="status-label-big" style="color:${curStatus.color}">${curStatus.label}</span>
            <span class="status-date">${timeline.filter(t=>t.tipo==='status').slice(-1)[0]?fmtDate(timeline.filter(t=>t.tipo==='status').slice(-1)[0].created_at):'—'}</span>
          </div>
          <div class="status-select-wrap">
            <div class="status-select-label">Alterar para:</div>
            <div class="status-grid" id="statusGrid">${statusGridHtml}</div>
          </div>
          <div class="status-add-wrap">
            <input class="status-add-inp" id="newStatusInp" placeholder="Novo status..." onkeydown="if(event.key==='Enter')addCustomStatus()">
            <button class="status-add-btn" onclick="addCustomStatus()">+ Criar</button>
          </div>
          <button class="status-apply-btn" onclick="applyStatus()">✓ Aplicar Status</button>
        </div>
      </div>
    </div>

    <!-- HISTÓRICO FULL WIDTH -->
    <div class="box" style="margin-bottom:40px">
      <div class="box-head">
        <span class="box-title">📅 Histórico</span>
        <span class="box-meta">${timeline.length} evento${timeline.length!==1?'s':''}</span>
      </div>
      <div class="feed-wrap">
        <div class="feed" id="tlWrap">${tlHtml}</div>
      </div>
      <div class="nota-wrap">
        <textarea class="nota-inp" id="notaInp" rows="2" placeholder="Adicionar anotação ao histórico..."></textarea>
        <button class="add-btn" onclick="addNota()">+ Registrar</button>
      </div>
    </div>`;
}

// ── STATUS ──
function selectStatus(key){
  selectedStatusKey=key;
  document.querySelectorAll('.status-opt').forEach(el=>{
    const k=el.getAttribute('onclick').match(/'([^']+)'/)?.[1];
    const s=getStatus(k);
    if(k===key){el.classList.add('sel');el.style.cssText=`border-color:${s.color};background:${s.color}18;color:${s.color}`;}
    else{el.classList.remove('sel');el.style.cssText='';}
  });
}

async function applyStatus(){
  if(!selectedStatusKey){toast('Selecione um status primeiro.','error');return;}
  try{
    const r=await dbPost('projeto_timeline',{cliente_id:clienteId,tipo:'status',conteudo:selectedStatusKey});
    if(r?.id){
      timeline.push(r);
      selectedStatusKey=null;
      // Update clientes_gr7.status for dashboard compatibility
      await dbPatch('clientes_gr7','id=eq.'+clienteId,{status:selectedStatusKey||r.conteudo});
      renderPage();
      toast('Status atualizado!','success');
    }
  }catch(e){toast(humanizeError(e),'error');}
}

async function addCustomStatus(){
  const inp=document.getElementById('newStatusInp');
  const label=(inp?.value||'').trim();
  if(!label)return;
  const key=label.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
  if(statusList.find(s=>s.key===key)){toast('Status já existe.','error');return;}
  const colors=['#818cf8','#38bdf8','#34d399','#fbbf24','#f87171','#e879f9','#fb923c','#4ade80'];
  const color=colors[statusList.length%colors.length];
  try{
    await dbPost('projeto_status_custom',{cliente_id:clienteId,key,label,color}).catch(()=>null);
    statusList.push({key,label,color});
    if(inp)inp.value='';
    renderPage();
    toast('Status criado!','success');
  }catch(e){toast(humanizeError(e),'error');}
}

// ── MÓDULO ──
async function toggleModulo(modulo,novoEstado){
  const date=novoEstado?new Date().toISOString():null;
  try{
    await dbUpsert('implant_modulos',{cliente_id:clienteId,modulo,concluido:novoEstado,data_conclusao:date},'cliente_id,modulo');
    modulos_prog[modulo]={done:novoEstado,date};renderPage();
  }catch(e){toast(humanizeError(e),'error');}
}

// Tarefas gerenciadas em tarefas.html

// ── NOTA ──
async function addNota(){
  const inp=document.getElementById('notaInp');
  const conteudo=inp?.value?.trim();if(!conteudo)return;
  try{
    const r=await dbPost('projeto_timeline',{cliente_id:clienteId,tipo:'nota',conteudo,autor:'—'});
    if(r?.id){timeline.push(r);inp.value='';renderPage();toast('Anotação registrada!','success');}
  }catch(e){toast(humanizeError(e),'error');}
}

if(clienteId)load();
</script>
</body>
</html>
