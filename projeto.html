<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GR7 — Projeto</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#07080d;--s1:#0e1018;--s2:#161820;--s3:#1e2030;--bdr:#252738;--text:#dde1f0;--muted:#5a5e78;--r:14px;--green:#00e5a0;--green2:#059669;--c0:#818cf8;--c1:#38bdf8;--c2:#34d399;--c3:#fbbf24;--c4:#f87171;--c5:#e879f9;--sb-w:240px;--sb-w-collapsed:64px;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;padding-left:var(--sb-w);transition:padding-left .25s cubic-bezier(.4,0,.2,1)}
body.sb-collapsed{padding-left:var(--sb-w-collapsed)}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5}
.blob{position:fixed;border-radius:50%;filter:blur(140px);pointer-events:none;z-index:0;opacity:.1}
.blob1{width:600px;height:600px;top:-150px;left:0;background:var(--c0)}
.blob2{width:500px;height:500px;bottom:-150px;right:-50px;background:var(--c5)}
/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;height:100vh;width:var(--sb-w);background:#0e1018;border-right:1px solid #1e2030;display:flex;flex-direction:column;z-index:999;transition:width .25s cubic-bezier(.4,0,.2,1);overflow:hidden}
.sidebar.collapsed{width:var(--sb-w-collapsed)}
.sb-logo{display:flex;align-items:center;gap:13px;padding:22px 16px 18px;border-bottom:1px solid #1e2030;flex-shrink:0;min-width:var(--sb-w);overflow:hidden}
.sb-logo-mark{width:36px;height:36px;flex-shrink:0;background:linear-gradient(135deg,#818cf8,#e879f9);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px;color:#fff;box-shadow:0 0 20px rgba(129,140,248,.35)}
.sb-logo-text{white-space:nowrap;overflow:hidden}
.sb-logo-text h2{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:-.3px;color:#fff}
.sb-logo-text p{font-size:10px;color:#5a5e78;margin-top:2px}
.sb-nav{flex:1;padding:12px 0;overflow-y:auto;overflow-x:hidden}
.sb-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#3a3e58;padding:10px 20px 4px;white-space:nowrap;opacity:1;transition:opacity .2s}
.sidebar.collapsed .sb-label{opacity:0}
.sb-item{display:flex;align-items:center;gap:12px;padding:11px 16px;color:#5a5e78;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;transition:all .15s;white-space:nowrap;overflow:hidden;border-left:2px solid transparent;margin:1px 0}
.sb-item:hover{color:#dde1f0;background:rgba(255,255,255,.04)}
.sb-item.active{color:#00e5a0;background:rgba(0,229,160,.07);border-left-color:#00e5a0}
.sb-icon{font-size:17px;flex-shrink:0;width:24px;display:flex;align-items:center;justify-content:center}
.sb-text{transition:opacity .2s}
.sidebar.collapsed .sb-text{opacity:0;pointer-events:none}
.sb-footer{border-top:1px solid #1e2030;padding:12px 16px;flex-shrink:0}
.sb-toggle{display:flex;align-items:center;gap:12px;background:transparent;border:1px solid #1e2030;border-radius:8px;padding:9px 12px;color:#5a5e78;font-size:12px;cursor:pointer;width:100%;transition:all .15s;white-space:nowrap;overflow:hidden}
.sb-toggle:hover{border-color:#3a3e58;color:#dde1f0}
.sb-toggle-icon{font-size:15px;flex-shrink:0;transition:transform .25s}
.sidebar.collapsed .sb-toggle-icon{transform:rotate(180deg)}
.sb-toggle-text{transition:opacity .2s}
.sidebar.collapsed .sb-toggle-text{opacity:0}
/* LAYOUT */
.shell{position:relative;z-index:10;padding:0 44px 80px;max-width:1200px}
/* HERO */
.hero{display:flex;align-items:center;gap:24px;padding:32px 0 28px;flex-wrap:wrap}
.hero-avatar{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#fff;flex-shrink:0}
.hero-info{flex:1;min-width:0}
.hero-name{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.5px}
.hero-fantasy{font-size:13px;color:var(--muted);margin-top:3px}
.hero-badges{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px}
.badge.novo{background:rgba(129,140,248,.12);color:var(--c0);border:1px solid rgba(129,140,248,.25)}
.badge.implantando{background:rgba(251,191,36,.1);color:var(--c3);border:1px solid rgba(251,191,36,.25)}
.badge.ativo{background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.25)}
.badge.info{background:var(--s2);color:var(--muted);border:1px solid var(--bdr)}
.hero-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.btn{padding:9px 18px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid;font-family:'Outfit',sans-serif}
.btn-ghost{background:transparent;border-color:var(--bdr);color:var(--muted)}
.btn-ghost:hover{border-color:var(--c0);color:var(--c0)}
.btn-primary{background:rgba(0,229,160,.1);border-color:var(--green);color:var(--green)}
.btn-primary:hover{background:rgba(0,229,160,.2)}
.btn-purple{background:rgba(129,140,248,.12);border-color:var(--c0);color:var(--c0)}
.btn-purple:hover{background:rgba(129,140,248,.22)}
/* PROGRESSO HERO */
.prog-hero{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:20px 24px;margin-bottom:28px;display:flex;align-items:center;gap:24px}
.prog-hero-bar-wrap{flex:1}
.prog-hero-top{display:flex;justify-content:space-between;margin-bottom:8px}
.prog-hero-label{font-size:12px;color:var(--muted)}
.prog-hero-pct{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:700}
.prog-track{height:10px;background:var(--s3);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.prog-stats{display:flex;gap:20px;flex-shrink:0}
.ps{text-align:center}
.ps-n{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600}
.ps-l{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
/* GRID PRINCIPAL */
.main-grid{display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start}
/* SEÇÃO */
.section-box{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:20px}
.sec-head{padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.sec-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.sec-count{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted)}
/* INSTALAÇÕES */
.install-item{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .15s}
.install-item:last-child{border-bottom:none}
.install-item:hover{background:var(--s2)}
.install-left{display:flex;align-items:center;gap:12px}
.install-icon{font-size:20px;width:36px;height:36px;background:var(--s2);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.install-name{font-size:14px;font-weight:600;color:var(--text)}
.install-sub{font-size:11px;color:var(--muted);margin-top:2px}
.install-right{display:flex;align-items:center;gap:10px}
.mini-ring{width:36px;height:36px;flex-shrink:0}
.mini-ring circle{fill:none;stroke-width:3.5;stroke-linecap:round}
.install-pct{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;min-width:36px;text-align:right}
.install-arrow{color:var(--muted);font-size:18px}
/* MÓDULOS */
.modules-grid{padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.mod-chip{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 8px;background:var(--s2);border:1.5px solid var(--bdr);border-radius:10px;cursor:pointer;transition:all .15s;text-align:center;user-select:none}
.mod-chip:hover{border-color:#3a3e58}
.mod-chip.done{background:rgba(0,229,160,.07);border-color:rgba(0,229,160,.35)}
.mod-chip-name{font-size:11px;font-weight:700;color:var(--muted)}
.mod-chip.done .mod-chip-name{color:var(--green)}
.mod-chip-check{width:18px;height:18px;border-radius:5px;border:1.5px solid #3a3e58;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:all .15s}
.mod-chip.done .mod-chip-check{background:var(--green);border-color:var(--green);color:#000}
.mod-chip-date{font-size:9px;color:var(--green);font-weight:400}
/* TAREFAS */
.tasks-body{padding:12px 16px}
.task-item{display:flex;align-items:center;gap:10px;padding:9px 10px;background:var(--s2);border:1px solid var(--bdr);border-radius:9px;margin-bottom:6px;transition:all .15s}
.task-item.done .task-text{text-decoration:line-through;color:var(--muted)}
.task-cb{width:20px;height:20px;border-radius:6px;border:1.5px solid #444;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;flex-shrink:0;transition:all .15s;color:transparent}
.task-item.done .task-cb{background:var(--green);border-color:var(--green);color:#000}
.task-text{flex:1;font-size:13px}
.task-del{width:22px;height:22px;border:none;background:transparent;color:#3a3e58;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;border-radius:5px;transition:all .15s;flex-shrink:0}
.task-del:hover{color:var(--c4);background:rgba(248,113,113,.1)}
.add-task-row{display:flex;gap:8px;margin-top:4px}
.add-task-input{flex:1;background:var(--s2);border:1px solid var(--bdr);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:'Outfit',sans-serif;outline:none;transition:border-color .2s}
.add-task-input:focus{border-color:var(--c0)}
.add-task-input::placeholder{color:var(--muted)}
.add-task-btn{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);border-radius:8px;padding:9px 14px;color:var(--green);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.add-task-btn:hover{background:rgba(0,229,160,.2)}
/* CONTATO BOX */
.contact-box{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;margin-bottom:20px}
.contact-title{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.contact-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:13px}
.contact-row:last-child{margin-bottom:0}
.contact-label{color:var(--muted);width:80px;flex-shrink:0;font-size:11px}
.contact-val{color:var(--text);font-weight:500}
/* INFO CARDS */
.info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.info-card{background:var(--s2);border-radius:10px;padding:14px;text-align:center}
.info-num{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:700}
.info-lbl{font-size:10px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
/* STATUS BTN */
.status-action{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:16px 20px;margin-bottom:20px}
.status-action-title{font-size:11px;color:var(--muted);margin-bottom:10px}
.status-btn{width:100%;padding:11px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid}
.status-btn.avancar{background:rgba(0,229,160,.1);border-color:var(--green);color:var(--green)}
.status-btn.avancar:hover{background:rgba(0,229,160,.2)}
.status-btn.concluido{background:rgba(129,140,248,.08);border-color:var(--c0);color:var(--c0);cursor:default}
/* MODAL CHECKLIST */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:flex-start;justify-content:center;z-index:1000;backdrop-filter:blur(6px);padding:24px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal-box{background:var(--s1);border:1px solid var(--bdr);border-radius:20px;width:100%;max-width:720px;margin:auto;animation:mIn .2s ease}
@keyframes mIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.mh{padding:22px 26px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;justify-content:space-between;gap:16px;position:sticky;top:0;background:var(--s1);z-index:1;border-radius:20px 20px 0 0}
.mh-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800}
.mh-sub{font-size:12px;color:var(--muted);margin-top:3px}
.m-close{width:32px;height:32px;border-radius:9px;border:1px solid var(--bdr);background:transparent;color:var(--muted);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.m-close:hover{border-color:var(--c4);color:var(--c4)}
.mbody{padding:20px 26px 26px}
.ck-prog{display:flex;align-items:center;gap:16px;background:var(--s2);border-radius:10px;padding:12px 16px;margin-bottom:20px}
.ck-prog-track{flex:1;height:8px;background:var(--s3);border-radius:99px;overflow:hidden}
.ck-prog-fill{height:100%;border-radius:99px;background:var(--green);transition:width .4s}
.ck-prog-pct{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:700;color:var(--green);min-width:48px;text-align:right}
.ck-list{display:flex;flex-direction:column;gap:6px}
.ck-item{background:var(--s2);border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:all .15s}
.ck-item:hover{border-color:#3a3e58}
.ck-item.done{opacity:.5}
.ck-item.done .ck-text{text-decoration:line-through;color:var(--muted)}
.ck-box{width:20px;height:20px;border:2px solid #444;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;flex-shrink:0;margin-top:1px;transition:all .2s}
.ck-item.done .ck-box{background:var(--green);border-color:var(--green);color:#000}
.ck-num{font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;min-width:26px;margin-top:2px;flex-shrink:0}
.ck-content{flex:1}
.ck-text{font-size:13px;color:var(--text);font-weight:500}
.ck-meta{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap}
.ck-manual{font-size:10px;color:var(--c0);text-decoration:none;border:1px solid rgba(129,140,248,.25);border-radius:99px;padding:2px 8px;transition:all .15s}
.ck-manual:hover{background:rgba(129,140,248,.1)}
.ck-date{font-size:10px;color:var(--green)}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#1e2030;border:1px solid #333;border-radius:10px;padding:12px 18px;font-size:13px;color:#ccc;z-index:9999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{border-color:rgba(0,229,160,.4);color:var(--green)}
.toast.error{border-color:rgba(248,113,113,.4);color:var(--c4)}
.spin{width:16px;height:16px;border:2px solid var(--bdr);border-top-color:var(--c0);border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.loader{padding:60px;text-align:center;color:var(--muted)}
@media(max-width:900px){.main-grid{grid-template-columns:1fr}.shell{padding:0 16px 80px}.info-grid{grid-template-columns:1fr 1fr}}
</style>
</head>

<div class="blob blob1"></div><div class="blob blob2"></div>
<aside class="sidebar" id="sidebar">
  <div class="sb-logo"><div class="sb-logo-mark">GR7</div><div class="sb-logo-text"><h2>GR7</h2><p>Sistema de Instalações</p></div></div>
  <nav class="sb-nav">
    <div class="sb-label">Menu</div>
    <a class="sb-item" href="index.html"><span class="sb-icon">🏠</span><span class="sb-text">Dashboard</span></a>
    <a class="sb-item" href="clientes.html"><span class="sb-icon">🏢</span><span class="sb-text">Clientes</span></a>
    <a class="sb-item active" href="implantacao.html"><span class="sb-icon">🚀</span><span class="sb-text">Implantação</span></a>
    <a class="sb-item" href="Checklist.html"><span class="sb-icon">✅</span><span class="sb-text">Checklist</span></a>

</aside>

<div class="shell" id="shell">
  <div class="loader" id="loading"><div class="spin"></div>Carregando projeto...</div>
</div>

<div class="toast" id="toast"></div>

<!-- MODAL CHECKLIST -->
<div class="modal-bg" id="modalCk">
  <div class="modal-box">
    <div class="mh">
      <div><div class="mh-title" id="ckTitle">—</div><div class="mh-sub" id="ckSub">—</div></div>
      <button class="m-close" onclick="closeCk()">✕</button>
    </div>
    <div class="mbody" id="ckBody"></div>
  </div>
</div>

<script>
const SURL='https://nhzjkahbkeusgntheyug.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oemprYWhia2V1c2dudGhleXVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjYwMDQsImV4cCI6MjA4ODg0MjAwNH0.hB2bJBMoJoztuNrb4xCRIgWmwMlayBpVOMWq3mI4nH4';
const SH={'Content-Type':'application/json','apikey':SKEY,'Authorization':'Bearer '+SKEY,'Prefer':'return=representation'};
async function dbGet(p){const r=await fetch(SURL+'/rest/v1/'+p,{headers:SH});return r.json();}
async function dbPost(t,b){const r=await fetch(SURL+'/rest/v1/'+t,{method:'POST',headers:SH,body:JSON.stringify(b)});return r.json();}
async function dbPatch(t,f,b){const r=await fetch(SURL+'/rest/v1/'+t+'?'+f,{method:'PATCH',headers:SH,body:JSON.stringify(b)});return r.json();}
async function dbDelete(t,f){await fetch(SURL+'/rest/v1/'+t+'?'+f,{method:'DELETE',headers:SH});}
async function dbUpsert(t,b,oc){const h={...SH,Prefer:'resolution=merge-duplicates,return=representation'};const r=await fetch(SURL+'/rest/v1/'+t+'?on_conflict='+oc,{method:'POST',headers:h,body:JSON.stringify(b)});return r.json();}

function toggleSidebar(){const sb=document.getElementById('sidebar');sb.classList.toggle('collapsed');document.body.classList.toggle('sb-collapsed');localStorage.setItem('sb_collapsed',sb.classList.contains('collapsed'));}
(function(){if(localStorage.getItem('sb_collapsed')==='true'){document.getElementById('sidebar').classList.add('collapsed');document.body.classList.add('sb-collapsed');}})();

const PAL=['#818cf8','#38bdf8','#34d399','#fbbf24','#f87171','#e879f9','#fb923c','#4ade80','#a78bfa','#22d3ee'];
function getColor(s){let h=0;for(const c of(s||'A'))h=(h*31+c.charCodeAt(0))%PAL.length;return PAL[h];}
function ini(s){return(s||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function fmtDate(d){return d?new Date(d).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'}):'—';}

function toast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.classList.remove('show'),3000);}

// URL param

function buildMaq(c){
  const l=[];
  for(let i=1;i<=(parseInt(c.qtd_servidor)||0);i++)l.push({key:`servidor_${i}`,tipo:'servidor',label:`🖥️ Servidor${(parseInt(c.qtd_servidor)||0)>1?' '+i:''}`,icon:'🖥️'});
  for(let i=1;i<=(parseInt(c.qtd_retaguarda)||0);i++)l.push({key:`retaguarda_${i}`,tipo:'retaguarda',label:`🗄️ Retaguarda${(parseInt(c.qtd_retaguarda)||0)>1?' '+i:''}`,icon:'🗄️'});
  for(let i=1;i<=(parseInt(c.qtd_caixas)||0);i++)l.push({key:`nfce_${i}`,tipo:'nfce',label:`🧾 PDV / NFCe${(parseInt(c.qtd_caixas)||0)>1?' '+i:''}`,icon:'🧾'});
  return l;
}

function calcGeral(){
  let tot=0,dn=0;
  buildMaq(cliente).forEach(m=>{
    const steps=STEPS[m.tipo]||[];tot+=steps.length;
    const mp=(progresso[m.key])||{};
    dn+=steps.filter(s=>mp[String(s.num)]?.done).length;
  });
  const mods=cliente.modulos||[];tot+=mods.length;
  dn+=mods.filter(m=>modulos_prog[m]?.done).length;
  tot+=tasks.length;dn+=tasks.filter(t=>t.done).length;
  return{tot,dn,pct:tot?Math.round(dn/tot*100):0};
}

async function load(){
  try{
    const [c,pg,mg,tg]=await Promise.all([
      dbGet(`clientes_gr7?id=eq.${clienteId}&limit=1`),
      dbGet(`implant_checklist?cliente_id=eq.${clienteId}`),
      dbGet(`implant_modulos?cliente_id=eq.${clienteId}`),
      dbGet(`implant_tasks?cliente_id=eq.${clienteId}&order=created_at.asc`),
    ]);
    if(!Array.isArray(c)||!c[0]){document.getElementById('shell').innerHTML='<div class="loader" style="color:var(--c4)">❌ Cliente não encontrado. <a href="implantacao.html" style="color:var(--c0)">Voltar</a></div>';return;}
    cliente={...c[0],modulos:typeof c[0].modulos==='string'?JSON.parse(c[0].modulos||'[]'):(c[0].modulos||[])};
    progresso={};
    if(Array.isArray(pg))pg.forEach(p=>{
      if(!progresso[p.maquina_key])progresso[p.maquina_key]={};
      progresso[p.maquina_key][p.item_num]={done:p.concluido,date:p.data_conclusao};
    });
    modulos_prog={};
    if(Array.isArray(mg))mg.forEach(m=>{modulos_prog[m.modulo]={done:m.concluido,date:m.data_conclusao};});
    tasks=Array.isArray(tg)?tg:[];
    renderPage();
  }catch(e){
    document.getElementById('shell').innerHTML=`<div class="loader" style="color:var(--c4)">❌ ${e.message}</div>`;
  }
}

function renderPage(){
  const c=cliente;
  const col=getColor(c.razao_social||'');
  const av=ini(c.nome_fantasia||c.razao_social||'');
  const status=c.status||'novo';
  const statusLabel={novo:'🔵 Novo',implantando:'🟡 Implantando',ativo:'🟢 Ativo'};
  const {tot,dn,pct}=calcGeral();
  const barCol=pct===100?'#00e5a0':pct>=60?'#fbbf24':pct>=20?'#818cf8':'#f87171';
  const maquinas=buildMaq(c);
  document.title=`GR7 — ${c.nome_fantasia||c.razao_social}`;

  // Status button
  const nextStatus={novo:'implantando',implantando:'ativo'};
  const nextLabel={novo:'▶ Iniciar Implantação',implantando:'✅ Marcar como Ativo'};
  const statusBtnHtml=status!=='ativo'
    ?`<button class="status-btn avancar" onclick="avancarStatus('${nextStatus[status]}')">${nextLabel[status]}</button>`
    :`<button class="status-btn concluido">✅ Cliente Ativo</button>`;

  // Instalações HTML
  const installHtml=maquinas.length?maquinas.map(m=>{
    const steps=STEPS[m.tipo]||[];
    const mp=progresso[m.key]||{};
    const done=steps.filter(s=>mp[String(s.num)]?.done).length;
    const mpct=steps.length?Math.round(done/steps.length*100):0;
    const col2=mpct===100?'#00e5a0':mpct>=60?'#fbbf24':'#818cf8';
    const R=14,circ=2*Math.PI*R,off=circ-(mpct/100)*circ;
    return `<div class="install-item" onclick="openCk('${m.key}','${m.tipo}','${m.label}')">
      <div class="install-left">
        <div class="install-icon">${m.icon}</div>
        <div><div class="install-name">${m.label}</div><div class="install-sub">${done}/${steps.length} etapas concluídas</div></div>
      </div>
      <div class="install-right">
        <svg class="mini-ring" viewBox="0 0 36 36" style="width:36px;height:36px">
          <circle cx="18" cy="18" r="${R}" fill="none" stroke="#1e2030" stroke-width="3.5"/>
          <circle cx="18" cy="18" r="${R}" fill="none" stroke="${col2}" stroke-width="3.5" stroke-linecap="round"
            stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"
            transform="rotate(-90 18 18)"/>
        </svg>
        <span class="install-pct" style="color:${col2}">${mpct===100?'✅':mpct+'%'}</span>
        <span class="install-arrow">›</span>
      </div>
    </div>`;
  }).join(''):`<div style="padding:16px 20px;color:var(--muted);font-size:13px">Nenhuma máquina configurada.</div>`;

  // Módulos HTML
  const mods=c.modulos||[];
  const modsHtml=mods.length?`<div class="modules-grid">${mods.map(m=>{
    const d=modulos_prog[m];const isDone=d?.done;
    const dt=d?.date?fmtDate(d.date):'';
    return `<div class="mod-chip ${isDone?'done':''}" onclick="toggleModulo('${m}',${isDone?'false':'true'})">
      <div class="mod-chip-check">${isDone?'✓':''}</div>
      <div class="mod-chip-name">${m}</div>
      ${isDone&&dt?`<div class="mod-chip-date">${dt}</div>`:''}
    </div>`;
  }).join('')}</div>`:`<div style="padding:16px 20px;color:var(--muted);font-size:13px">Nenhum módulo contratado.</div>`;

  // Tasks HTML
  const tasksDone=tasks.filter(t=>t.done).length;
  const tasksHtml=`<div class="tasks-body">
    ${tasks.map(t=>`<div class="task-item ${t.done?'done':''}" id="task-${t.id}">
      <div class="task-cb" onclick="toggleTask('${t.id}',${t.done?'false':'true'})">${t.done?'✓':''}</div>
      <span class="task-text">${t.texto}</span>
      <button class="task-del" onclick="deleteTask('${t.id}')">✕</button>
    </div>`).join('')}
    <div class="add-task-row">
      <input class="add-task-input" id="newTaskInput" type="text" placeholder="Nova tarefa..." onkeydown="if(event.key==='Enter')addTask()">
      <button class="add-task-btn" onclick="addTask()">+ Adicionar</button>
    </div>
  </div>`;

  document.getElementById('shell').innerHTML=`
    <!-- HERO -->
    <div class="hero">
      <div class="hero-avatar" style="background:${col}22;border:2px solid ${col}44;width:72px;height:72px;font-size:26px">${av}</div>
      <div class="hero-info">
        <div class="hero-name">${c.razao_social||'—'}</div>
        <div class="hero-fantasy">${c.nome_fantasia||''}</div>
        <div class="hero-badges">
          <span class="badge ${status}">${statusLabel[status]}</span>
          ${c.cnpj?`<span class="badge info">🪪 ${c.cnpj}</span>`:''}
          ${c.data_venda?`<span class="badge info">📅 ${fmtDate(c.data_venda)}</span>`:''}
        </div>
      </div>
      <div class="hero-right">
        <button class="btn btn-ghost" onclick="window.location.href='implantacao.html'">← Voltar</button>
        <button class="btn btn-purple" onclick="window.location.href='clientes.html?edit='+clienteId">✏️ Editar</button>
      </div>
    </div>

    <!-- PROGRESSO -->
    <div class="prog-hero">
      <div class="prog-hero-bar-wrap">
        <div class="prog-hero-top">
          <span class="prog-hero-label">Progresso Geral do Projeto</span>
          <span class="prog-hero-pct" style="color:${barCol}">${pct}%</span>
        </div>
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${barCol}"></div></div>
      </div>
      <div class="prog-stats">
        <div class="ps"><div class="ps-n" style="color:${barCol}">${dn}</div><div class="ps-l">Feitas</div></div>
        <div class="ps"><div class="ps-n" style="color:var(--muted)">${tot-dn}</div><div class="ps-l">Restam</div></div>
        <div class="ps"><div class="ps-n" style="color:var(--text)">${tot}</div><div class="ps-l">Total</div></div>
      </div>
    </div>

    <!-- MAIN GRID -->
    <div class="main-grid">
      <!-- COLUNA ESQUERDA -->
      <div>
        <!-- INSTALAÇÕES -->
        <div class="section-box">
          <div class="sec-head">
            <span class="sec-title">🖥️ Instalações</span>
            <span class="sec-count">${maquinas.length} máquina${maquinas.length!==1?'s':''}</span>
          </div>
          ${installHtml}
        </div>

        <!-- MÓDULOS -->
        <div class="section-box">
          <div class="sec-head">
            <span class="sec-title">🧩 Módulos Contratados</span>
            <span class="sec-count">${mods.filter(m=>modulos_prog[m]?.done).length}/${mods.length} instalados</span>
          </div>
          ${modsHtml}
        </div>

        <!-- TAREFAS -->
        <div class="section-box">
          <div class="sec-head">
            <span class="sec-title">📋 Tarefas do Projeto</span>
            <span class="sec-count">${tasksDone}/${tasks.length} concluídas</span>
          </div>
          ${tasksHtml}
        </div>
      </div>

      <!-- COLUNA DIREITA -->
      <div>
        <!-- INFRA -->
        <div class="info-grid" style="margin-bottom:20px">
          <div class="info-card"><div class="info-num" style="color:var(--c0)">${c.qtd_servidor||0}</div><div class="info-lbl">🖥️ Servidores</div></div>
          <div class="info-card"><div class="info-num" style="color:var(--c1)">${c.qtd_retaguarda||0}</div><div class="info-lbl">🗄️ Retaguardas</div></div>
          <div class="info-card"><div class="info-num" style="color:var(--green)">${c.qtd_caixas||0}</div><div class="info-lbl">🧾 Caixas</div></div>
        </div>

        <!-- CONTATO -->
        <div class="contact-box">
          <div class="contact-title">Contato</div>
          <div class="contact-row"><span class="contact-label">Responsável</span><span class="contact-val">${c.responsavel||'—'}</span></div>
          <div class="contact-row"><span class="contact-label">Telefone</span><span class="contact-val">${c.telefone||'—'}</span></div>
          <div class="contact-row"><span class="contact-label">CNPJ</span><span class="contact-val" style="font-family:monospace;font-size:11px">${c.cnpj||'—'}</span></div>
          <div class="contact-row"><span class="contact-label">Venda</span><span class="contact-val">${fmtDate(c.data_venda)}</span></div>
        </div>

        <!-- STATUS ACTION -->
        <div class="status-action">
          <div class="status-action-title">Status do Projeto</div>
          ${statusBtnHtml}
        </div>
      </div>
    </div>`;
}

// ── MÓDULO ──
async function toggleModulo(modulo, novoEstado){
  const date=novoEstado?new Date().toISOString():null;
  try{
    await dbUpsert('implant_modulos',{cliente_id:clienteId,modulo,concluido:novoEstado,data_conclusao:date},'cliente_id,modulo');
    modulos_prog[modulo]={done:novoEstado,date};
    renderPage();
  }catch(e){toast('Erro: '+e.message,'error');}
}

// ── TASKS ──
async function addTask(){
  const inp=document.getElementById('newTaskInput');
  const texto=inp?.value?.trim();if(!texto)return;
  try{
    const r=await dbPost('implant_tasks',{cliente_id:clienteId,texto,done:false});
    if(r?.id){tasks.push(r);inp.value='';renderPage();}
  }catch(e){toast('Erro: '+e.message,'error');}
}
async function toggleTask(id,novoEstado){
  try{
    await dbPatch('implant_tasks','id=eq.'+id,{done:novoEstado});
    const t=tasks.find(x=>x.id===id);if(t)t.done=novoEstado;
    renderPage();
  }catch(e){toast('Erro: '+e.message,'error');}
}
async function deleteTask(id){
  try{
    await dbDelete('implant_tasks','id=eq.'+id);
    tasks=tasks.filter(t=>t.id!==id);renderPage();
  }catch(e){toast('Erro: '+e.message,'error');}
}

// ── STATUS ──
async function avancarStatus(novoStatus){
  try{
    await dbPatch('clientes_gr7','id=eq.'+clienteId,{status:novoStatus});
    cliente.status=novoStatus;renderPage();
    const l={implantando:'🟡 Implantação iniciada!',ativo:'🟢 Cliente marcado como Ativo!'};
    toast(l[novoStatus]||'Atualizado','success');
  }catch(e){toast('Erro: '+e.message,'error');}
}

// ── CHECKLIST MODAL ──
function openCk(maqKey,tipo,label){
  currentCkKey=maqKey;currentCkTipo=tipo;
  document.getElementById('ckTitle').textContent=label;
  document.getElementById('ckSub').textContent=(cliente.nome_fantasia||cliente.razao_social||'')+'  ·  Checklist de Instalação';
  renderCkBody();
  document.getElementById('modalCk').classList.add('open');
}
function closeCk(){document.getElementById('modalCk').classList.remove('open');renderPage();}

function renderCkBody(){
  const steps=STEPS[currentCkTipo]||[];
  const mp=progresso[currentCkKey]||{};
  const done=steps.filter(s=>mp[String(s.num)]?.done).length;
  const pct=steps.length?Math.round(done/steps.length*100):0;
  const barCol=pct===100?'#00e5a0':pct>=60?'#fbbf24':'#818cf8';
  let html=`<div class="ck-prog">
    <div class="ck-prog-track"><div class="ck-prog-fill" id="ckFill" style="width:${pct}%;background:${barCol}"></div></div>
    <div class="ck-prog-pct" id="ckPct" style="color:${barCol}">${pct}%</div>
  </div><div class="ck-list">`;
  steps.forEach(s=>{
    const key=String(s.num);const d=mp[key];const isDone=d?.done;
    const dt=d?.date?fmtDate(d.date):'';
    html+=`<div class="ck-item ${isDone?'done':''}" id="cki-${key}" onclick="toggleCkItem('${key}',${isDone?'false':'true'})">
      <div class="ck-box">✓</div>
      <span class="ck-num">${s.num}</span>
      <div class="ck-content">
        <div class="ck-text">${s.text}</div>
        <div class="ck-meta">
          ${s.manual?`<a class="ck-manual" href="${s.manual}" target="_blank" onclick="event.stopPropagation()">📖 Manual</a>`:''}
          ${isDone&&dt?`<span class="ck-date">✓ ${dt}</span>`:''}
        </div>
      </div>
    </div>`;
  });
  html+='</div>';
  document.getElementById('ckBody').innerHTML=html;
}

async function toggleCkItem(itemNum,novoEstado){
  const date=novoEstado?new Date().toISOString():null;
  try{
    await dbUpsert('implant_checklist',{cliente_id:clienteId,maquina_key:currentCkKey,tipo:currentCkTipo,item_num:itemNum,concluido:novoEstado,data_conclusao:date},'cliente_id,maquina_key,item_num');
    if(!progresso[currentCkKey])progresso[currentCkKey]={};
    progresso[currentCkKey][itemNum]={done:novoEstado,date};
    // Update item UI
    const el=document.getElementById('cki-'+itemNum);
    if(el){
      el.classList.toggle('done',novoEstado);
      el.querySelector('.ck-box').textContent=novoEstado?'✓':'';
      let ds=el.querySelector('.ck-date');
      if(novoEstado&&date){const dt=fmtDate(date);if(!ds){ds=document.createElement('span');ds.className='ck-date';el.querySelector('.ck-meta').appendChild(ds);}ds.textContent='✓ '+dt;}
      else if(ds)ds.remove();
    }
    // Update progress bar
    const steps=STEPS[currentCkTipo]||[];
    const mp=progresso[currentCkKey]||{};
    const dn=steps.filter(s=>mp[String(s.num)]?.done).length;
    const pct=steps.length?Math.round(dn/steps.length*100):0;
    const barCol=pct===100?'#00e5a0':pct>=60?'#fbbf24':'#818cf8';
    const f=document.getElementById('ckFill');const p=document.getElementById('ckPct');
    if(f){f.style.width=pct+'%';f.style.background=barCol;}
    if(p){p.textContent=pct+'%';p.style.color=barCol;}
  }catch(e){toast('Erro: '+e.message,'error');}
}

document.getElementById('modalCk').addEventListener('click',function(e){if(e.target===this)closeCk();});

if(clienteId)load();
</script>
