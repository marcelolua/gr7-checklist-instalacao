<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GR7 — Implantação</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#07080d;--s1:#0e1018;--s2:#161820;--s3:#1e2030;--bdr:#252738;--text:#dde1f0;--muted:#5a5e78;--r:14px;--green:#00e5a0;--green2:#059669;--c0:#818cf8;--c1:#38bdf8;--c2:#34d399;--c3:#fbbf24;--c4:#f87171;--c5:#e879f9;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5}
.blob{position:fixed;border-radius:50%;filter:blur(130px);pointer-events:none;z-index:0;opacity:.1}
.blob1{width:700px;height:700px;top:-200px;left:0;background:var(--c0)}
.blob2{width:500px;height:500px;bottom:-200px;right:-100px;background:var(--c5)}
/* LAYOUT */
.shell{position:relative;z-index:10;padding:0 44px 80px}
header{display:flex;align-items:center;justify-content:space-between;padding:32px 0 28px;flex-wrap:wrap;gap:16px}
.hd-title h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.3px}
.hd-title p{font-size:12px;color:var(--muted);margin-top:3px}
.hd-right{display:flex;align-items:center;gap:10px}
.chip{font-family:'IBM Plex Mono',monospace;font-size:11px;background:var(--s1);border:1px solid var(--bdr);padding:6px 14px;border-radius:99px;color:var(--muted);user-select:none}
.chip.btn{cursor:pointer;transition:all .15s}.chip.btn:hover{border-color:var(--c0);color:var(--c0)}
/* SUMMARY */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px}
.sc{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:20px 22px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc.tot::before{background:linear-gradient(90deg,var(--c0),var(--c5))}
.sc.sn::before{background:linear-gradient(90deg,var(--c1),var(--c0))}
.sc.si::before{background:linear-gradient(90deg,var(--c3),#f97316)}
.sc.sa::before{background:linear-gradient(90deg,var(--green),var(--green2))}
.sc-num{font-family:'IBM Plex Mono',monospace;font-size:36px;font-weight:600;line-height:1;margin-bottom:4px}
.sc.tot .sc-num{color:var(--c0)}.sc.sn .sc-num{color:var(--c1)}.sc.si .sc-num{color:var(--c3)}.sc.sa .sc-num{color:var(--green)}
.sc-lbl{font-size:12px;color:var(--muted)}
/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap input{width:100%;background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:10px 14px 10px 38px;color:var(--text);font-size:13px;font-family:'Outfit',sans-serif;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--c0)}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px}
.fbtn{background:var(--s1);border:1px solid var(--bdr);border-radius:10px;padding:9px 16px;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.fbtn:hover,.fbtn.on{border-color:var(--c0);color:var(--c0);background:rgba(129,140,248,.08)}
.fbtn.on-green{border-color:var(--green);color:var(--green);background:rgba(0,229,160,.08)}
.sec{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:20px}
/* CARDS GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px}
/* CLIENT CARD */
.cli-card{background:var(--s1);border:1.5px solid var(--bdr);border-radius:18px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;padding-bottom:18px}
.cli-card:hover{border-color:var(--c0);transform:translateY(-5px);box-shadow:0 20px 48px rgba(0,0,0,.45)}
.cli-card-topbar{height:3px;width:100%;position:absolute;top:0;left:0;border-radius:18px 18px 0 0}
.cli-avatar-area{padding:28px 16px 0;display:flex;flex-direction:column;align-items:center;width:100%}
.avatar-ring-wrap{position:relative;width:90px;height:90px;flex-shrink:0}
.avatar-ring-wrap svg{position:absolute;top:-7px;left:-7px;width:104px;height:104px;pointer-events:none}
.avatar-ring-wrap svg circle{fill:none;stroke-width:3.5;stroke-linecap:round}
.ring-bg{stroke:#1e2030;transform:rotate(-90deg);transform-origin:52px 52px}
.ring-fill{stroke-linecap:round;transform:rotate(-90deg);transform-origin:52px 52px;transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1)}
.cli-av{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:30px;font-weight:800;color:#fff;border:2px solid rgba(255,255,255,.08)}
.cli-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff;text-align:center;line-height:1.35;margin-top:13px;padding:0 14px;word-break:break-word}
.cli-razao{font-size:10px;color:var(--muted);text-align:center;margin-top:3px;padding:0 10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.cli-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;padding:3px 9px;border-radius:99px;margin-top:9px}
.cli-badge.novo{background:rgba(129,140,248,.12);color:var(--c0);border:1px solid rgba(129,140,248,.25)}
.cli-badge.implantando{background:rgba(251,191,36,.1);color:var(--c3);border:1px solid rgba(251,191,36,.25)}
.cli-badge.ativo{background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.25)}
.cli-pct{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;margin-top:6px}
/* empty / loader */
.empty-state{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted)}
.spin{width:16px;height:16px;border:2px solid var(--bdr);border-top-color:var(--c0);border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.loader{grid-column:1/-1;padding:60px;text-align:center;color:var(--muted)}
@media(max-width:768px){.shell{padding:0 16px 60px}.summary{grid-template-columns:1fr 1fr}.cards-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}}
</style>
<script>
/* ═══ GR7 auth.js — inline ═══ */
/* ═══════════════════════════════════════════════════════════
   GR7 — auth.js  •  Sistema de Autenticação Central
   ═══════════════════════════════════════════════════════════ */
(function(){

  const SURL='https://nhzjkahbkeusgntheyug.supabase.co';
  const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oemprYWhia2V1c2dudGhleXVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjYwMDQsImV4cCI6MjA4ODg0MjAwNH0.hB2bJBMoJoztuNrb4xCRIgWmwMlayBpVOMWq3mI4nH4';
  const SH={'Content-Type':'application/json','apikey':SKEY,'Authorization':'Bearer '+SKEY};
  const SESSION_KEY='gr7_session';
  const SESSION_TTL=8*60*60*1000; // 8h
  const MAX_TRIES=3;
  const LOCK_TIME=30*1000; // 30s

  /* ── Hash SHA-256 ── */
  async function sha256(txt){
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(txt));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }

  /* ── Sessão ── */
  function getSession(){
    try{
      const s=JSON.parse(sessionStorage.getItem(SESSION_KEY)||'null');
      if(!s)return null;
      if(Date.now()-s.ts>SESSION_TTL){sessionStorage.removeItem(SESSION_KEY);return null;}
      return s;
    }catch{return null;}
  }
  function setSession(user){
    sessionStorage.setItem(SESSION_KEY,JSON.stringify({...user,ts:Date.now()}));
  }
  function clearSession(){sessionStorage.removeItem(SESSION_KEY);}

  /* ── API pública ── */
  window.GR7Auth={
    getSession,
    isAdmin:()=>(getSession()||{}).perfil==='admin',
    isLogged:()=>!!getSession(),
    logout(){clearSession();window.location.href='login.html';},

    /* Protege a página — redireciona se não logado */
    require(adminOnly){
      const s=getSession();
      if(!s){
        sessionStorage.setItem('gr7_redirect',window.location.href);
        window.location.href='login.html';
        return false;
      }
      if(adminOnly&&s.perfil!=='admin'){
        window.location.href='login.html?denied=1';
        return false;
      }
      return true;
    },

    /* Injeta barra de sessão no topo do body */
    injectSessionBar(){
      const s=getSession();
      if(!s)return;
      const bar=document.createElement('div');
      bar.id='gr7-session-bar';
      bar.innerHTML=`
        <div class="gsb-inner">
          <div class="gsb-av" style="background:${s.cor}22;color:${s.cor}">${ini(s.nome)}</div>
          <div class="gsb-info">
            <span class="gsb-name">${s.nome}</span>
            <span class="gsb-role">${s.cargo}</span>
          </div>
          <div class="gsb-badge ${s.perfil==='admin'?'admin':'colab'}">${s.perfil==='admin'?'👑 Admin':'👤 Colaborador'}</div>
          <button class="gsb-logout" onclick="GR7Auth.logout()">Sair →</button>
        </div>`;
      const style=document.createElement('style');
      style.textContent=`
        #gr7-session-bar{position:fixed;top:0;left:0;right:0;z-index:9000;background:#0e1018;border-bottom:1px solid #252738;padding:0 24px}
        .gsb-inner{display:flex;align-items:center;gap:12px;height:44px;max-width:1400px;margin:0 auto}
        .gsb-av{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:11px;font-weight:800;flex-shrink:0}
        .gsb-name{font-size:13px;font-weight:600;color:#dde1f0}
        .gsb-role{font-size:11px;color:#5a5e78;margin-left:8px}
        .gsb-badge{padding:2px 9px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.5px;flex-shrink:0}
        .gsb-badge.admin{background:rgba(232,121,249,.12);color:#e879f9;border:1px solid rgba(232,121,249,.2)}
        .gsb-badge.colab{background:rgba(56,189,248,.1);color:#38bdf8;border:1px solid rgba(56,189,248,.2)}
        .gsb-logout{margin-left:auto;padding:5px 12px;border-radius:7px;border:1px solid #252738;background:transparent;color:#5a5e78;font-size:11px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
        .gsb-logout:hover{border-color:#f87171;color:#f87171}
        body{padding-top:44px!important}`;
      document.head.appendChild(style);
      document.body.prepend(bar);
    },

    /* Esconde elementos com data-admin-only se não for admin */
    applyPermissions(){
      const admin=this.isAdmin();
      document.querySelectorAll('[data-admin-only]').forEach(el=>{
        el.style.display=admin?'':'none';
      });
      document.querySelectorAll('[data-colab-only]').forEach(el=>{
        el.style.display=admin?'none':'';
      });
    },

    /* Login — chama do login.html */
    async doLogin(colaboradorId,pin){
      const hash=await sha256(pin);
      const r=await fetch(`${SURL}/rest/v1/colaboradores?id=eq.${colaboradorId}&pin_hash=eq.${hash}&ativo=eq.true&select=id,nome,cargo,cor,perfil`,{headers:SH});
      const data=await r.json();
      if(!Array.isArray(data)||!data.length)return null;
      const u=data[0];
      setSession(u);
      return u;
    },

    /* Carrega lista de colaboradores para o select de login */
    async loadColaboradores(){
      const r=await fetch(`${SURL}/rest/v1/colaboradores?ativo=eq.true&select=id,nome,cargo,cor,perfil&order=nome`,{headers:SH});
      return r.json();
    }
  };

  function ini(n){const p=(n||'').trim().split(' ');return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():(n||'??').slice(0,2).toUpperCase();}

})();

</script>
<script>
/* ═══ GR7 sidebar.js — inline ═══ */
/* ═══════════════════════════════════════════════════════════════
   GR7 — sidebar.js  •  Menu lateral + utilitários globais
   ═══════════════════════════════════════════════════════════════ */
(function(){

/* ══════════════════════════════════════
   1. UTILITÁRIOS GLOBAIS
══════════════════════════════════════ */
window.humanizeError = function(e){
  if(!e) return 'Erro desconhecido';
  const msg = e.message || e.hint || e.details || String(e);
  if(msg.includes('Failed to fetch')) return 'Sem conexão com o servidor.';
  if(msg.includes('column') && msg.includes('does not exist')) return 'Coluna não encontrada — execute o SQL de migração no Supabase.';
  if(msg.includes('JWT')) return 'Chave de API inválida.';
  return msg.slice(0,120);
};

window.toast = function(msg, type){
  let el = document.getElementById('gr7-toast');
  if(!el){
    el = document.createElement('div');
    el.id = 'gr7-toast';
    el.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#161820;border:1px solid #252738;border-radius:12px;padding:13px 18px;font-size:13px;color:#dde1f0;z-index:99999;opacity:0;transform:translateY(10px);transition:all .3s;max-width:320px;font-family:Outfit,sans-serif;pointer-events:none';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.borderColor = type==='success'?'rgba(0,229,160,.4)':type==='error'?'rgba(248,113,113,.4)':'#252738';
  el.style.color = type==='success'?'#00e5a0':type==='error'?'#f87171':'#dde1f0';
  el.style.opacity = '1'; el.style.transform = 'translateY(0)';
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateY(10px)'; }, 3000);
};

window.gr7Alert = function({title='', message='', icon='ℹ️'}={}){
  return new Promise(resolve => {
    const bg = _makeModalBg();
    bg.innerHTML = `<div style="${_modalBox()}">
      <div style="font-size:32px;margin-bottom:12px">${icon}</div>
      <div style="font-family:Syne,sans-serif;font-size:17px;font-weight:700;margin-bottom:8px">${title}</div>
      <div style="font-size:13px;color:#8a8faa;margin-bottom:22px;line-height:1.6">${message}</div>
      <div style="display:flex;justify-content:flex-end">
        <button id="_gr7ok" style="${_btnStyle('#818cf8')}">OK</button>
      </div></div>`;
    document.body.appendChild(bg);
    bg.querySelector('#_gr7ok').onclick = () => { bg.remove(); resolve(); };
  });
};

window.gr7Confirm = function({title='', message='', confirmText='Confirmar', cancelText='Cancelar', danger=false, icon='❓'}={}){
  return new Promise(resolve => {
    const bg = _makeModalBg();
    const btnColor = danger ? '#f87171' : '#818cf8';
    bg.innerHTML = `<div style="${_modalBox()}">
      <div style="font-size:32px;margin-bottom:12px">${icon}</div>
      <div style="font-family:Syne,sans-serif;font-size:17px;font-weight:700;margin-bottom:8px">${title}</div>
      <div style="font-size:13px;color:#8a8faa;margin-bottom:22px;line-height:1.6">${message}</div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button id="_gr7no" style="${_btnStyle('#252738',true)}">${cancelText}</button>
        <button id="_gr7yes" style="${_btnStyle(btnColor)}">${confirmText}</button>
      </div></div>`;
    document.body.appendChild(bg);
    bg.querySelector('#_gr7yes').onclick = () => { bg.remove(); resolve(true); };
    bg.querySelector('#_gr7no').onclick  = () => { bg.remove(); resolve(false); };
  });
};

window.gr7DirtyGuard = function({fieldIds=[], closeFn=()=>{}, interceptEl=[], confirmOpts={}}={}){
  const initVals = {};
  fieldIds.forEach(id => { const el=document.getElementById(id); if(el) initVals[id]=el.value; });
  function isDirty(){ return fieldIds.some(id=>{ const el=document.getElementById(id); return el&&el.value!==initVals[id]; }); }
  async function intercept(e){
    // Só fecha se clicou EXATAMENTE neste elemento (não em filhos)
    if(e && e.target !== e.currentTarget) return;
    if(!isDirty()){ closeFn(); return; }
    e && e.preventDefault && e.preventDefault();
    const ok = await gr7Confirm({...{title:'Descartar?',message:'Alterações serão perdidas.',confirmText:'Descartar',cancelText:'Continuar'},...confirmOpts});
    if(ok) closeFn();
  }
  const handlers = [];
  interceptEl.forEach(el => {
    if(!el) return;
    const fn = e => { intercept(e); };
    el.addEventListener('click', fn);
    handlers.push({el, fn});
  });
  return { destroy(){ handlers.forEach(({el,fn})=>el.removeEventListener('click',fn)); } };
};

/* ── Skeletons ── */
function _sk(w,h,r=8){ return `<div style="width:${w};height:${h}px;border-radius:${r}px;background:linear-gradient(90deg,#161820 25%,#1e2030 50%,#161820 75%);background-size:200% 100%;animation:skshimmer 1.4s infinite;flex-shrink:0"></div>`; }
if(!document.getElementById('_skshimmer-style')){
  const s=document.createElement('style');
  s.id='_skshimmer-style';
  s.textContent='@keyframes skshimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}';
  document.head.appendChild(s);
}
window.gr7Skeletons = {
  userPills(n=4){ return Array(n).fill(0).map(()=>`<div style="display:flex;align-items:center;gap:12px;background:#161820;border:1px solid #252738;border-radius:12px;padding:12px 14px">${_sk('38px',38,10)}${_sk('60%',14)}</div>`).join(''); },
  clientRows(n=5){ return Array(n).fill(0).map(()=>`<div style="display:grid;grid-template-columns:1fr 120px 130px 110px;gap:12px;padding:13px 24px;border-bottom:1px solid #252738">${_sk('180px',14)}${_sk('80px',14)}${_sk('110px',10,99)}${_sk('60px',5,99)}</div>`).join(''); },
  clientTable(n=5){ return Array(n).fill(0).map(()=>`<div style="display:grid;grid-template-columns:1fr 100px 120px 80px 60px;gap:12px;padding:13px 18px;border-bottom:1px solid #252738;align-items:center">${_sk('160px',14)}${_sk('70px',12)}${_sk('90px',10,99)}${_sk('50px',5,99)}${_sk('50px',14)}</div>`).join(''); },
  implantCards(n=8){ return Array(n).fill(0).map(()=>`<div style="background:#0e1018;border:1.5px solid #252738;border-radius:18px;padding:28px 16px 18px;display:flex;flex-direction:column;align-items:center;gap:12px">${_sk('80px',80,99)}${_sk('100px',14)}${_sk('60px',10,99)}</div>`).join(''); },
  projetoShell(){ return `<div style="padding:40px;text-align:center;color:#5a5e78">Carregando projeto...</div>`; },
  colabCols(n=3){ return Array(n).fill(0).map(()=>`<div style="background:#0e1018;border:1px solid #252738;border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:10px">${_sk('80%',16)}${_sk('100%',8,99)}${_sk('60%',12)}</div>`).join(''); },
  rankingRows(n=5){ return Array(n).fill(0).map(()=>`<div style="display:grid;grid-template-columns:46px 44px 1fr 200px 64px;gap:12px;padding:14px 24px;border-bottom:1px solid #252738;align-items:center">${_sk('30px',30,8)}${_sk('36px',36,10)}${_sk('140px',14)}${_sk('100%',7,99)}${_sk('40px',14)}</div>`).join(''); },
  collaboratorCards(n=3){ return Array(n).fill(0).map(()=>`<div style="background:#0e1018;border:1px solid #252738;border-radius:14px;overflow:hidden"><div style="padding:20px 20px 16px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #252738">${_sk('48px',48,14)}${_sk('120px',16)}</div><div style="padding:16px 20px">${_sk('100%',7,99)}</div></div>`).join(''); },
};

function _makeModalBg(){
  const bg=document.createElement('div');
  bg.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:99000;backdrop-filter:blur(4px);padding:20px';
  return bg;
}
function _modalBox(){ return 'background:#0e1018;border:1px solid #252738;border-radius:20px;padding:32px;width:100%;max-width:420px;text-align:center;color:#dde1f0;font-family:Outfit,sans-serif'; }
function _btnStyle(bg, outline=false){ return `padding:9px 22px;border-radius:9px;border:1px solid ${bg};background:${outline?'transparent':bg};color:${outline?'#8a8faa':'#fff'};font-family:Outfit,sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s`; }

/* ══════════════════════════════════════
   2. SIDEBAR HTML + STYLES
══════════════════════════════════════ */
const NAV_ITEMS = [
  { href:'index.html',              icon:'🏠', label:'Dashboard'    },
  { href:'clientes.html',           icon:'🏢', label:'Clientes'     },
  { href:'implantacao.html',        icon:'🚀', label:'Implantação'  },
  { href:'tarefas.html',            icon:'📌', label:'Tarefas'      },
  { href:'Checklist.html',          icon:'✅', label:'Checklist'    },
  { href:'relatorios-checklist.html',icon:'📊',label:'Relatórios'  },
  { href:'colaboradores.html',      icon:'👥', label:'Colaboradores', adminOnly: false },
];

const SIDEBAR_CSS = `
  #gr7-sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1099;display:none}
  #gr7-sidebar-overlay.open{display:block}
  #gr7-sidebar{position:fixed;top:0;left:0;bottom:0;width:200px;background:#0e1018;border-right:1px solid #252738;z-index:1100;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
  #gr7-sidebar.open{transform:translateX(0)}
  .gsb-logo{display:flex;align-items:center;gap:12px;padding:22px 18px 18px;border-bottom:1px solid #252738;flex-shrink:0}
  .gsb-mark{width:38px;height:38px;background:linear-gradient(135deg,#818cf8,#e879f9);border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px;color:#fff;flex-shrink:0}
  .gsb-brand{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#dde1f0}
  .gsb-brand-sub{font-size:10px;color:#5a5e78;margin-top:1px}
  .gsb-nav{padding:14px 10px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
  .gsb-section{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#5a5e78;padding:10px 8px 6px;margin-top:4px}
  .gsb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;text-decoration:none;color:#8a8faa;font-size:13px;font-weight:500;transition:all .18s;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:'Outfit',sans-serif}
  .gsb-item:hover{background:#161820;color:#dde1f0}
  .gsb-item.active{background:rgba(129,140,248,.12);color:#818cf8;font-weight:600}
  .gsb-item-icon{font-size:16px;flex-shrink:0;width:22px;text-align:center}
  .gsb-footer{padding:14px 10px;border-top:1px solid #252738;flex-shrink:0}
  .gsb-user{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:#161820;margin-bottom:8px}
  .gsb-user-av{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:11px;font-weight:800;flex-shrink:0}
  .gsb-user-info{flex:1;min-width:0}
  .gsb-user-name{font-size:12px;font-weight:600;color:#dde1f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .gsb-user-role{font-size:10px;color:#5a5e78;margin-top:1px}
  .gsb-logout{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:8px;border-radius:8px;border:1px solid #252738;background:transparent;color:#5a5e78;font-size:12px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
  .gsb-logout:hover{border-color:#f87171;color:#f87171}
  #gr7-menu-btn{position:fixed;top:14px;left:14px;z-index:1098;width:38px;height:38px;border-radius:10px;background:#0e1018;border:1px solid #252738;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;transition:border-color .15s}
  #gr7-menu-btn:hover{border-color:#818cf8}
  #gr7-menu-btn span{display:block;width:18px;height:2px;background:#8a8faa;border-radius:2px;transition:all .2s}
  body{padding-left:0!important}
  @media(min-width:900px){
    #gr7-sidebar{transform:translateX(0)!important}
    #gr7-sidebar-overlay{display:none!important}
    #gr7-menu-btn{display:none!important}
    body{padding-left:200px!important}
  }
`;

function injectSidebar(){
  // Style
  const styleEl = document.createElement('style');
  styleEl.textContent = SIDEBAR_CSS;
  document.head.appendChild(styleEl);

  const session = (window.GR7Auth && GR7Auth.getSession()) || null;
  const isAdmin = session && session.perfil === 'admin';
  const curPage = location.pathname.split('/').pop() || 'index.html';

  function ini(n){ const p=(n||'').trim().split(' '); return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():(n||'?').slice(0,2).toUpperCase(); }

  const navHTML = NAV_ITEMS.map(item => {
    const active = curPage === item.href ? ' active' : '';
    return `<a class="gsb-item${active}" href="${item.href}">
      <span class="gsb-item-icon">${item.icon}</span>${item.label}
    </a>`;
  }).join('');

  const userBlock = session ? `
    <div class="gsb-user">
      <div class="gsb-user-av" style="background:${(session.cor||'#818cf8')}22;color:${session.cor||'#818cf8'}">${ini(session.nome)}</div>
      <div class="gsb-user-info">
        <div class="gsb-user-name">${session.nome}</div>
        <div class="gsb-user-role">${isAdmin?'👑 Admin':'👤 Colaborador'}</div>
      </div>
    </div>
    <button class="gsb-logout" onclick="GR7Auth&&GR7Auth.logout()">Sair do sistema →</button>
  ` : '';

  // Sidebar element
  const sidebar = document.createElement('div');
  sidebar.id = 'gr7-sidebar';
  sidebar.innerHTML = `
    <div class="gsb-logo">
      <div class="gsb-mark">GR7</div>
      <div><div class="gsb-brand">GR7</div><div class="gsb-brand-sub">Sistema de Instalações</div></div>
    </div>
    <nav class="gsb-nav">
      <div class="gsb-section">Menu</div>
      ${navHTML}
    </nav>
    <div class="gsb-footer">${userBlock}</div>
  `;

  // Overlay + hamburger
  const overlay = document.createElement('div');
  overlay.id = 'gr7-sidebar-overlay';
  overlay.onclick = closeSidebar;

  const menuBtn = document.createElement('div');
  menuBtn.id = 'gr7-menu-btn';
  menuBtn.innerHTML = '<span></span><span></span><span></span>';
  menuBtn.onclick = toggleSidebar;

  document.body.prepend(menuBtn);
  document.body.prepend(overlay);
  document.body.prepend(sidebar);
}

function toggleSidebar(){
  document.getElementById('gr7-sidebar').classList.toggle('open');
  document.getElementById('gr7-sidebar-overlay').classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('gr7-sidebar').classList.remove('open');
  document.getElementById('gr7-sidebar-overlay').classList.remove('open');
}

// Auto-inject when DOM ready
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', injectSidebar);
} else {
  injectSidebar();
}

})();

</script>
</head>
<body>
<div class="blob blob1"></div><div class="blob blob2"></div>


<div class="shell">
  <header>
    <div class="hd-title"><h1>🚀 Implantação</h1><p>Projetos em andamento</p></div>
    <div class="hd-right">
      <div class="chip" id="dateChip"></div>
      <div class="chip btn" onclick="loadProjetos()">↺ Atualizar</div>
    </div>
  </header>
  <div class="summary">
    <div class="sc tot"><div class="sc-num" id="sTot">—</div><div class="sc-lbl">Total de Projetos</div></div>
    <div class="sc sn"><div class="sc-num" id="sNovo">—</div><div class="sc-lbl">🔵 Novos</div></div>
    <div class="sc si"><div class="sc-num" id="sImp">—</div><div class="sc-lbl">🟡 Implantando</div></div>
    <div class="sc sa"><div class="sc-num" id="sAtv">—</div><div class="sc-lbl">🟢 Ativos</div></div>
  </div>
  <div class="toolbar">
    <div class="search-wrap"><input type="text" id="searchInput" placeholder="Buscar cliente..." oninput="renderCards()"></div>
    <button class="fbtn on" id="fAll" onclick="setFilter('all')">Todos</button>
    <button class="fbtn" id="fNovo" onclick="setFilter('novo')">🔵 Novo</button>
    <button class="fbtn" id="fImp" onclick="setFilter('implantando')">🟡 Implantando</button>
    <button class="fbtn" id="fAtv" onclick="setFilter('ativo')">🟢 Ativo</button>
  </div>
  <p class="sec" id="secLabel">Projetos</p>
  <div class="cards-grid" id="cardsGrid"></div>
</div>

<script>
const SURL='https://nhzjkahbkeusgntheyug.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oemprYWhia2V1c2dudGhleXVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjYwMDQsImV4cCI6MjA4ODg0MjAwNH0.hB2bJBMoJoztuNrb4xCRIgWmwMlayBpVOMWq3mI4nH4';
const SH={'Content-Type':'application/json','apikey':SKEY,'Authorization':'Bearer '+SKEY};
async function dbGet(p){const r=await fetch(SURL+'/rest/v1/'+p,{headers:SH});return r.json();}


const PAL=['#818cf8','#38bdf8','#34d399','#fbbf24','#f87171','#e879f9','#fb923c','#4ade80','#a78bfa','#22d3ee','#f472b6','#60a5fa'];
function getColor(s){let h=0;for(const c of(s||'A'))h=(h*31+c.charCodeAt(0))%PAL.length;return PAL[h];}
function ini(s){return(s||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();}

let allProjetos=[],progresso={},modulos_prog={},tasks_data={},filtro='all';
const SCNT={servidor:23,retaguarda:18,nfce:18};

function buildMaq(c){
  const l=[];
  for(let i=1;i<=(parseInt(c.qtd_servidor)||0);i++)l.push({key:`servidor_${i}`,tipo:'servidor'});
  for(let i=1;i<=(parseInt(c.qtd_retaguarda)||0);i++)l.push({key:`retaguarda_${i}`,tipo:'retaguarda'});
  for(let i=1;i<=(parseInt(c.qtd_caixas)||0);i++)l.push({key:`nfce_${i}`,tipo:'nfce'});
  return l;
}

function calcPct(c){
  let tot=0,dn=0;
  buildMaq(c).forEach(m=>{
    const n=SCNT[m.tipo]||0;tot+=n;
    const mp=(progresso[c.id]||{})[m.key]||{};
    dn+=Object.values(mp).filter(v=>v).length;
  });
  const mods=c.modulos||[];tot+=mods.length;
  const modp=modulos_prog[c.id]||{};dn+=mods.filter(m=>modp[m]).length;
  const tasks=tasks_data[c.id]||[];tot+=tasks.length;dn+=tasks.filter(t=>t.done).length;
  return tot?Math.round(dn/tot*100):0;
}

async function loadProjetos(){
  document.getElementById('cardsGrid').innerHTML=gr7Skeletons.implantCards(8);
  try{
    const cl=await dbGet('clientes_gr7?order=created_at.desc');
    if(!Array.isArray(cl)){allProjetos=[];renderCards();return;}
    allProjetos=cl.map(c=>({...c,modulos:typeof c.modulos==='string'?JSON.parse(c.modulos||'[]'):(c.modulos||[])}));

    const [pg,mg,tg]=await Promise.all([
      dbGet('implant_checklist?select=cliente_id,maquina_key,item_num,concluido'),
      dbGet('implant_modulos?select=cliente_id,modulo,concluido'),
      dbGet('implant_tasks?select=cliente_id,id,done'),
    ]).catch(()=>[[], [], []]);

    progresso={};
    if(Array.isArray(pg))pg.forEach(p=>{
      if(!progresso[p.cliente_id])progresso[p.cliente_id]={};
      if(!progresso[p.cliente_id][p.maquina_key])progresso[p.cliente_id][p.maquina_key]={};
      progresso[p.cliente_id][p.maquina_key][p.item_num]=p.concluido;
    });
    modulos_prog={};
    if(Array.isArray(mg))mg.forEach(m=>{
      if(!modulos_prog[m.cliente_id])modulos_prog[m.cliente_id]={};
      modulos_prog[m.cliente_id][m.modulo]=m.concluido;
    });
    tasks_data={};
    if(Array.isArray(tg))tg.forEach(t=>{
      if(!tasks_data[t.cliente_id])tasks_data[t.cliente_id]=[];
      tasks_data[t.cliente_id].push(t);
    });

    document.getElementById('sTot').textContent=allProjetos.length;
    document.getElementById('sNovo').textContent=allProjetos.filter(c=>(c.status||'novo')==='novo').length;
    document.getElementById('sImp').textContent=allProjetos.filter(c=>c.status==='implantando').length;
    document.getElementById('sAtv').textContent=allProjetos.filter(c=>c.status==='ativo').length;
    renderCards();
  }catch(e){
    document.getElementById('cardsGrid').innerHTML='<div class="loader" style="color:var(--c4)">⚠️ '+humanizeError(e)+'</div>';
  }
}

function setFilter(f){
  filtro=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on','on-green'));
  const map={all:'fAll',novo:'fNovo',implantando:'fImp',ativo:'fAtv'};
  const btn=document.getElementById(map[f]);
  if(btn)btn.classList.add(f==='ativo'?'on-green':'on');
  renderCards();
}

function renderCards(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const list=allProjetos.filter(c=>{
    if(filtro!=='all'&&(c.status||'novo')!==filtro)return false;
    if(q){const h=((c.razao_social||'')+(c.nome_fantasia||'')).toLowerCase();if(!h.includes(q))return false;}
    return true;
  });
  document.getElementById('secLabel').textContent=`Projetos (${list.length})`;
  if(!list.length){
    document.getElementById('cardsGrid').innerHTML=`<div class="empty-state"><div style="font-size:52px;margin-bottom:16px">🚀</div><p>Nenhum cliente encontrado.<br><a href="clientes.html" style="color:var(--c0)">Cadastre clientes</a> para iniciar.</p></div>`;
    return;
  }
  document.getElementById('cardsGrid').innerHTML=list.map(c=>{
    const pct=calcPct(c);
    const status=c.status||'novo';
    const col=getColor(c.razao_social||'');
    const av=ini(c.nome_fantasia||c.razao_social||'');
    const statusLabel={novo:'🔵 Novo',implantando:'🟡 Implantando',ativo:'🟢 Ativo'};
    const barCol=pct===100?'#00e5a0':pct>=60?'#fbbf24':pct>=20?'#818cf8':'#f87171';
    // SVG ring
    const R=45,circ=2*Math.PI*R,off=circ-(pct/100)*circ;
    return `<div class="cli-card" onclick="abrirProjeto('${c.id}')">
      <div class="cli-card-topbar" style="background:${barCol}"></div>
      <div class="cli-avatar-area">
        <div class="avatar-ring-wrap">
          <svg viewBox="0 0 104 104">
            <circle class="ring-bg" cx="52" cy="52" r="${R}" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="0"/>
            <circle class="ring-fill" cx="52" cy="52" r="${R}" stroke="${barCol}" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/>
          </svg>
          <div class="cli-av" style="background:${col}22;border-color:${col}55">${av}</div>
        </div>
        <div class="cli-name">${c.nome_fantasia||c.razao_social||'—'}</div>
        ${c.nome_fantasia&&c.razao_social?`<div class="cli-razao">${c.razao_social}</div>`:''}
        <div class="cli-badge ${status}">${statusLabel[status]}</div>
        <div class="cli-pct" style="color:${barCol}">${pct}%</div>
      </div>
    </div>`;
  }).join('');
}

function abrirProjeto(id){ window.location.href='projeto.html?id='+id; }
document.getElementById('dateChip').textContent=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
loadProjetos();
</script>
</body>
</html>
