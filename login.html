<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GR7 — Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#07080d;--s1:#0e1018;--s2:#161820;--s3:#1e2030;--bdr:#252738;--text:#dde1f0;--muted:#5a5e78;--green:#00e5a0;--c0:#818cf8;--c1:#38bdf8;--c3:#fbbf24;--c4:#f87171;--c5:#e879f9;}
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5}
.blob{position:fixed;border-radius:50%;filter:blur(140px);pointer-events:none;z-index:0}
.blob1{width:700px;height:700px;top:-250px;left:-200px;background:var(--c0);opacity:.12}
.blob2{width:500px;height:500px;bottom:-200px;right:-100px;background:var(--c5);opacity:.1}

.card{position:relative;z-index:10;background:var(--s1);border:1px solid var(--bdr);border-radius:24px;padding:44px 40px;width:100%;max-width:400px;margin:20px;animation:slideUp .45s cubic-bezier(.4,0,.2,1)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--c0),var(--c5));border-radius:24px 24px 0 0}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.logo{display:flex;align-items:center;gap:14px;margin-bottom:36px}
.logo-mark{width:50px;height:50px;background:linear-gradient(135deg,var(--c0),var(--c5));border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:15px;color:#fff;box-shadow:0 0 30px rgba(129,140,248,.35);flex-shrink:0}
.logo-text h1{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.3px}
.logo-text p{font-size:12px;color:var(--muted);margin-top:2px}

.field{margin-bottom:20px}
.lbl{display:block;font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px;font-family:'IBM Plex Mono',monospace}
.input-wrap{position:relative}
.inp{width:100%;background:var(--s2);border:1.5px solid var(--bdr);border-radius:11px;padding:13px 14px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
.inp:focus{border-color:var(--c0);box-shadow:0 0 0 3px rgba(129,140,248,.12)}
.inp::placeholder{color:var(--muted)}
.inp.err-shake{animation:shake .4s ease}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px;transition:color .15s}
.eye-btn:hover{color:var(--text)}

@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

.enter-btn{width:100%;margin-top:6px;padding:14px;border-radius:12px;background:linear-gradient(135deg,var(--c0),#6366f1);border:none;color:#fff;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.4px;position:relative;overflow:hidden}
.enter-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);opacity:0;transition:opacity .2s}
.enter-btn:hover:not(:disabled)::after{opacity:1}
.enter-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 14px 36px rgba(99,102,241,.4)}
.enter-btn:active:not(:disabled){transform:translateY(0)}
.enter-btn:disabled{opacity:.35;cursor:default;transform:none}

.msg{min-height:20px;text-align:center;font-size:12px;margin:12px 0 0;transition:all .2s}
.msg.err{color:var(--c4)}.msg.ok{color:var(--green)}

.lock-bar{display:none;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:10px;padding:12px 16px;text-align:center;font-size:12px;color:var(--c4);margin-top:14px}
.lock-bar.show{display:block}

.denied{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--c4);margin-bottom:22px;text-align:center;display:none}
.denied.show{display:block}

.version{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;z-index:10;white-space:nowrap}

/* Mobile */
@media(max-width:480px){.card{padding:32px 24px;margin:16px}.logo-mark{width:42px;height:42px;font-size:13px}}
</style>

<script src="auth.js"></script>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="card">
  <div class="denied" id="deniedMsg">🚫 Acesso restrito. Faça login como administrador.</div>

  <div class="logo">
    <div class="logo-mark">GR7</div>
    <div class="logo-text">
      <h1>Bem-vindo</h1>
      <p>Identifique-se para continuar</p>
    </div>
  </div>

  <div class="field">
    <label class="lbl" for="inpUser">Usuário</label>
    <div class="input-wrap">
      <input class="inp" id="inpUser" type="text" autocomplete="username" placeholder="seu.usuario" spellcheck="false" autocapitalize="none"/>
    </div>
  </div>

  <div class="field">
    <label class="lbl" for="inpSenha">Senha</label>
    <div class="input-wrap">
      <input class="inp" id="inpSenha" type="password" autocomplete="current-password" placeholder="••••••••"/>
      <button class="eye-btn" id="eyeBtn" type="button" onclick="toggleSenha()" title="Mostrar/ocultar senha">👁</button>
    </div>
  </div>

  <button class="enter-btn" id="enterBtn" onclick="doLogin()">Entrar →</button>

  <div class="lock-bar" id="lockBar">🔒 Muitas tentativas — aguarde <span id="lockCount">30</span>s</div>
  <div class="msg" id="msg"></div>
</div>

<div class="version">GR7 · v3.0</div>

<script>
let tries=0,locked=false,lockTimer=null;

/* Já logado → redireciona */
if(GR7Auth.isLogged()){
  const redir=sessionStorage.getItem('gr7_redirect')||'index.html';
  sessionStorage.removeItem('gr7_redirect');
  window.location.href=redir;
}
if(new URLSearchParams(location.search).get('denied')){
  document.getElementById('deniedMsg').classList.add('show');
}

function toggleSenha(){
  const inp=document.getElementById('inpSenha');
  const btn=document.getElementById('eyeBtn');
  if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}
  else{inp.type='password';btn.textContent='👁';}
}

function setMsg(txt,type){
  const m=document.getElementById('msg');
  m.textContent=txt;m.className='msg'+(type?' '+type:'');
}

function shakeField(id){
  const el=document.getElementById(id);
  el.classList.remove('err-shake');
  requestAnimationFrame(()=>el.classList.add('err-shake'));
  setTimeout(()=>el.classList.remove('err-shake'),500);
}

async function doLogin(){
  if(locked)return;
  const usuario=document.getElementById('inpUser').value.trim();
  const senha=document.getElementById('inpSenha').value;
  if(!usuario){setMsg('⚠️ Informe o usuário','err');shakeField('inpUser');return;}
  if(!senha){setMsg('⚠️ Informe a senha','err');shakeField('inpSenha');return;}

  const btn=document.getElementById('enterBtn');
  btn.disabled=true;btn.textContent='Verificando...';setMsg('','');

  try{
    const user=await GR7Auth.doLogin(usuario,senha);
    if(user){
      setMsg('✅ Acesso liberado!','ok');
      btn.textContent='✅ Entrando...';
      localStorage.setItem('gr7_current_user',user.nome);
      setTimeout(()=>{
        const redir=sessionStorage.getItem('gr7_redirect')||'index.html';
        sessionStorage.removeItem('gr7_redirect');
        window.location.href=redir;
      },600);
    }else{
      tries++;
      document.getElementById('inpSenha').value='';
      shakeField('inpSenha');
      if(tries>=3){startLock();}
      else{
        const left=3-tries;
        setMsg(`❌ Usuário ou senha incorretos. ${left} tentativa${left>1?'s':''} restante${left>1?'s':''}.`,'err');
        btn.disabled=false;btn.textContent='Entrar →';
      }
    }
  }catch(e){
    setMsg('⚠️ Erro de conexão. Tente novamente.','err');
    btn.disabled=false;btn.textContent='Entrar →';
  }
}

function startLock(){
  locked=true;tries=0;
  document.getElementById('enterBtn').disabled=true;
  let s=30;
  document.getElementById('lockCount').textContent=s;
  document.getElementById('lockBar').classList.add('show');
  setMsg('','');
  lockTimer=setInterval(()=>{
    s--;document.getElementById('lockCount').textContent=s;
    if(s<=0){
      clearInterval(lockTimer);locked=false;
      document.getElementById('lockBar').classList.remove('show');
      const btn=document.getElementById('enterBtn');
      btn.disabled=false;btn.textContent='Entrar →';
    }
  },1000);
}

/* Teclado: Tab entre campos, Enter submete */
document.getElementById('inpUser').addEventListener('keydown',e=>{
  if(e.key==='Enter'){document.getElementById('inpSenha').focus();}
});
document.getElementById('inpSenha').addEventListener('keydown',e=>{
  if(e.key==='Enter')doLogin();
});
</script>
</body>
</html>
